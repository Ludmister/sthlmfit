<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Kalorier</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="topbar-inner">
      <button class="topbar-back" onclick="location.href='index.html'">
        <i class="ti ti-arrow-left"></i> Tillbaka
      </button>
      <div class="topbar-title">Kalorier</div>
      <span class="nh-badge" id="nh-badge" style="font-size:11px">…</span>
    </div>
  </div>

  <div class="page-content" id="content">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='index.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <a class="nav-tab-log" href="log.html">
      <span class="icon"><i class="ti ti-plus"></i></span>Logga
    </a>
    <button class="nav-tab" onclick="location.href='leaderboard.html'">
      <i class="ti ti-trophy"></i>Tävling
    </button>
    <button class="nav-tab" onclick="location.href='friends.html'">
      <i class="ti ti-users"></i>Vänner
    </button>
    <button class="nav-tab" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile   = await getProfile(user.id);
  document.getElementById('nh-badge').textContent = profile?.neighbourhoods?.name ?? '–';

  const todayStr  = getTodayStr();
  const calTarget = (profile?.goal_type === 'lose_weight' && profile?.goal_value)
    ? profile.goal_value : 2000;

  async function loadMeals() {
    const { data } = await sb.from('meals')
      .select('id, food_name, calories, protein, carbs, fat')
      .eq('user_id', user.id).eq('logged_date', todayStr)
      .order('created_at', { ascending: true });
    return data || [];
  }

  let meals = await loadMeals();
  let searchResults = [];

  function totalCal(ms) { return ms.reduce((s, m) => s + (m.calories || 0), 0); }
  function totalMacro(ms, key) { return Math.round(ms.reduce((s, m) => s + (m[key] || 0), 0)); }

  async function estimateWithAI(description) {
    const { data, error } = await sb.functions.invoke('estimate-calories', { body: { description } });
    if (error) throw error;
    return data;
  }

  function render() {
    const total  = totalCal(meals);
    const pct    = Math.min(100, Math.round(total / calTarget * 100));
    const isOver = total > calTarget;
    const todayLabel = new Date().toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
    const protein = totalMacro(meals, 'protein');
    const carbs   = totalMacro(meals, 'carbs');
    const fat     = totalMacro(meals, 'fat');

    document.getElementById('content').innerHTML = `
      <div class="card">
        <div class="card-label">${todayLabel}</div>
        <div class="calorie-total">${total.toLocaleString('sv-SE')}
          <span>/ ${calTarget.toLocaleString('sv-SE')} kcal</span>
        </div>
        <div class="calorie-bar-wrap">
          <div class="calorie-bar-fill${isOver ? ' over' : ''}" id="cal-bar" style="width:0%"></div>
        </div>
        <div class="calorie-stats">
          <span>${pct}% av dagsmål</span>
          <span style="font-weight:700;color:${isOver ? 'var(--danger)' : 'var(--green)'}">
            ${isOver
              ? `${(total - calTarget).toLocaleString('sv-SE')} kcal över`
              : `${(calTarget - total).toLocaleString('sv-SE')} kcal kvar`}
          </span>
        </div>
        ${meals.length > 0 ? `
        <div class="macro-row">
          <div class="macro-badge"><div class="macro-val">${protein}g</div><div class="macro-label">Protein</div></div>
          <div class="macro-badge"><div class="macro-val">${carbs}g</div><div class="macro-label">Kolhydr.</div></div>
          <div class="macro-badge"><div class="macro-val">${fat}g</div><div class="macro-label">Fett</div></div>
        </div>` : ''}
      </div>

      <div class="card">
        <div class="card-title">Lägg till måltid</div>

        <div style="margin-bottom:16px">
          <label class="field-label" style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <i class="ti ti-robot" style="font-size:15px;color:var(--green)"></i>
            Beskriv vad du åt
          </label>
          <div style="display:flex;gap:8px">
            <input type="text" class="input" id="ai-input"
              placeholder="t.ex. 'pannkakor med sylt och kaffe'" style="flex:1" />
            <button class="btn btn-primary btn-sm" id="ai-btn" style="flex-shrink:0;white-space:nowrap">
              Uppskatta
            </button>
          </div>
          <div id="ai-result" style="display:none;margin-top:10px"></div>
        </div>

        <div class="section-divider"><span>eller sök manuellt</span></div>

        <div class="search-wrap">
          <input type="text" class="input" id="food-input"
            placeholder="Sök mat, t.ex. 'äpple', 'pasta'…" autocomplete="off" />
          <div class="search-results" id="search-results"></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">Dagens måltider</div>
          <div style="font-size:15px;font-weight:800;color:var(--green)">${total.toLocaleString('sv-SE')} kcal</div>
        </div>
        <div id="meal-list">
          ${meals.length === 0
            ? '<div class="empty"><i class="ti ti-salad" style="font-size:28px;display:block;margin-bottom:8px;color:var(--border)"></i>Inga måltider loggade ännu idag.</div>'
            : meals.map(m => `
                <div class="meal-item">
                  <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.food_name}</span>
                  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
                    <span class="meal-kcal">${m.calories} kcal</span>
                    <button class="meal-delete" data-id="${m.id}">
                      <i class="ti ti-x"></i>
                    </button>
                  </div>
                </div>`).join('')}
        </div>
      </div>
    `;

    requestAnimationFrame(() => setTimeout(() => {
      const bar = document.getElementById('cal-bar');
      if (bar) bar.style.width = pct + '%';
    }, 80));

    // AI
    const aiInput  = document.getElementById('ai-input');
    const aiBtn    = document.getElementById('ai-btn');
    const aiResult = document.getElementById('ai-result');
    let aiEstimate = null;

    async function runAI() {
      const q = aiInput.value.trim();
      if (!q) { aiInput.focus(); return; }
      aiBtn.disabled = true; aiBtn.innerHTML = '<i class="ti ti-loader-2"></i>';
      aiResult.style.display = 'none';
      try {
        aiEstimate = await estimateWithAI(q);
        const p = aiEstimate.protein || 0, c = aiEstimate.carbs || 0, f = aiEstimate.fat || 0;
        aiResult.innerHTML = `
          <div style="background:var(--green-50);border-radius:var(--r-sm);padding:14px;border-left:3px solid var(--green)">
            <div style="font-size:15px;font-weight:700;color:var(--text-sub)">${aiEstimate.meal_name || aiEstimate.food_name}</div>
            <div style="font-size:26px;font-weight:900;color:var(--green);line-height:1;margin:4px 0">
              ${aiEstimate.calories} <span style="font-size:14px;font-weight:500;color:var(--text-muted)">kcal</span>
            </div>
            <div class="macro-row" style="margin-bottom:10px">
              <div class="macro-badge"><div class="macro-val">${Math.round(p)}g</div><div class="macro-label">Protein</div></div>
              <div class="macro-badge"><div class="macro-val">${Math.round(c)}g</div><div class="macro-label">Kolhydr.</div></div>
              <div class="macro-badge"><div class="macro-val">${Math.round(f)}g</div><div class="macro-label">Fett</div></div>
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:4px">
              <i class="ti ti-robot" style="font-size:13px"></i> Uppskattning av Claude AI
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" id="ai-confirm">
                <i class="ti ti-plus"></i> Lägg till
              </button>
              <button class="btn btn-outline btn-sm" id="ai-cancel">Avbryt</button>
            </div>
          </div>`;
        aiResult.style.display = 'block';
        document.getElementById('ai-confirm').addEventListener('click', async () => {
          await sb.from('meals').insert({
            user_id: user.id,
            food_name: aiEstimate.meal_name || aiEstimate.food_name,
            calories: aiEstimate.calories,
            protein: Math.round(aiEstimate.protein || 0),
            carbs: Math.round(aiEstimate.carbs || 0),
            fat: Math.round(aiEstimate.fat || 0),
            logged_date: todayStr,
          });
          meals = await loadMeals(); render();
        });
        document.getElementById('ai-cancel').addEventListener('click', () => {
          aiResult.style.display = 'none'; aiInput.value = ''; aiEstimate = null;
        });
      } catch (err) {
        aiResult.innerHTML = `<div class="alert alert-error show">${err.message || 'Kunde inte kontakta AI.'}</div>`;
        aiResult.style.display = 'block';
      } finally {
        aiBtn.disabled = false; aiBtn.textContent = 'Uppskatta';
      }
    }

    aiBtn.addEventListener('click', runAI);
    aiInput.addEventListener('keydown', e => { if (e.key === 'Enter') runAI(); });

    // Manual search
    const foodInput = document.getElementById('food-input');
    const resultsEl = document.getElementById('search-results');
    let debounce;

    foodInput.addEventListener('input', () => {
      clearTimeout(debounce);
      const q = foodInput.value.trim();
      if (!q) { resultsEl.classList.remove('open'); return; }
      debounce = setTimeout(() => doSearch(q), 400);
    });
    foodInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') { resultsEl.classList.remove('open'); foodInput.blur(); }
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) resultsEl.classList.remove('open');
    });

    async function doSearch(q) {
      resultsEl.innerHTML = '<div style="padding:12px;font-size:14px;color:var(--text-muted)">Söker…</div>';
      resultsEl.classList.add('open');
      try {
        const res  = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=10&fields=product_name,nutriments`);
        const json = await res.json();
        searchResults = (json.products || [])
          .filter(p => p.product_name && p.nutriments?.['energy-kcal_100g']).slice(0, 6);
        if (!searchResults.length) {
          resultsEl.innerHTML = '<div style="padding:12px;font-size:14px;color:var(--text-muted)">Inga resultat.</div>';
          return;
        }
        resultsEl.innerHTML = searchResults.map((p, i) => {
          const kcal = Math.round(p.nutriments['energy-kcal_100g']);
          const name = p.product_name.length > 36 ? p.product_name.slice(0, 36) + '…' : p.product_name;
          return `<div class="search-result-item" data-i="${i}">${name}<span class="kcal">${kcal} kcal/100g</span></div>`;
        }).join('');
        resultsEl.querySelectorAll('.search-result-item').forEach(el => {
          el.addEventListener('click', () => addMeal(parseInt(el.dataset.i)));
        });
      } catch {
        resultsEl.innerHTML = '<div style="padding:12px;font-size:14px;color:var(--danger)">Kunde inte ansluta.</div>';
      }
    }

    document.querySelectorAll('.meal-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        await sb.from('meals').delete().eq('id', btn.dataset.id);
        meals = await loadMeals(); render();
      });
    });
  }

  async function addMeal(i) {
    const p       = searchResults[i];
    const kcal100 = Math.round(p.nutriments['energy-kcal_100g']);
    const grams   = parseFloat(prompt(`Hur många gram av "${p.product_name}"?`, '100'));
    if (!grams || grams <= 0) return;
    await sb.from('meals').insert({
      user_id: user.id,
      food_name: `${p.product_name} (${grams}g)`,
      calories: Math.round(kcal100 * grams / 100),
      protein: Math.round((p.nutriments['proteins_100g'] || 0) * grams / 100),
      carbs:   Math.round((p.nutriments['carbohydrates_100g'] || 0) * grams / 100),
      fat:     Math.round((p.nutriments['fat_100g'] || 0) * grams / 100),
      logged_date: todayStr,
    });
    meals = await loadMeals(); render();
  }

  render();
})();
</script>
</body>
</html>
