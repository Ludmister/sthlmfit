<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Tävling</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="screen">

  <div class="topbar topbar-dark">
    <div class="topbar-inner">
      <div class="topbar-logo">Sthlm<span>Fit</span></div>
      <span class="nh-badge" id="nh-badge">…</span>
    </div>
  </div>

  <div class="page-content">

    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:20px;font-weight:900;color:var(--text)">Stadsdelstävlingen</div>
      <div class="live-badge"><div class="live-dot"></div>&nbsp;Live</div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;color:var(--text-muted)">Poäng nollställs varje måndag midnatt</div>
      <div class="countdown-pill">
        <i class="ti ti-clock" style="font-size:13px"></i>
        <span id="countdown">…</span>
      </div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="location.href='map.html'">
        <i class="ti ti-map"></i> Karta
      </button>
    </div>

    <div id="lb-content"><div class="spinner"></div></div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='index.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <a class="nav-tab-log" href="log.html">
      <span class="icon"><i class="ti ti-plus"></i></span>Logga
    </a>
    <button class="nav-tab active" onclick="location.href='leaderboard.html'">
      <i class="ti ti-trophy"></i>Tävling
    </button>
    <button class="nav-tab" onclick="location.href='friends.html'">
      <i class="ti ti-users"></i>Vänner
    </button>
    <button class="nav-tab" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile = await getProfile(user.id).catch(() => null);
  document.getElementById('nh-badge').textContent = profile?.neighbourhoods?.name ?? '–';

  // Live countdown
  function updateCountdown() {
    document.getElementById('countdown').textContent = getCountdownToMonday();
  }
  updateCountdown();
  setInterval(updateCountdown, 30000);

  async function render() {
    const { data } = await sb.from('neighbourhood_leaderboard').select('*');
    const entries = (data || []).sort((a, b) => (b.weekly_points || 0) - (a.weekly_points || 0));
    const container = document.getElementById('lb-content');
    const myNhId = profile?.neighbourhood_id;

    const allZero = entries.every(e => !(e.weekly_points > 0));
    if (!entries.length || allZero) {
      container.innerHTML = `<div class="card lb-empty">
        <i class="ti ti-confetti" style="font-size:36px;color:var(--green-100);display:block;margin-bottom:8px"></i>
        Inga poäng loggade ännu denna vecka.<br>
        Logga ett träningspass och sätt igång tävlingen!
      </div>`;
      return;
    }

    const leader = entries[0]?.weekly_points || 1;

    // Podium (top 3) — display order: #2 left, #1 center, #3 right
    const top3 = entries.slice(0, 3);
    function podiumBlock(e, rank) {
      if (!e) return `<div class="podium-block p${rank}"></div>`;
      const nb     = NEIGHBOURHOODS.find(n => n.id === e.id);
      const color  = e.color || nb?.color || '#1D9E75';
      const isMine = e.id === myNhId;
      const pts    = (e.weekly_points || 0).toLocaleString('sv-SE');
      return `
        <div class="podium-block p${rank}" onclick="location.href='neighbourhood.html?id=${e.id}&name=${encodeURIComponent(e.name)}'" style="cursor:pointer">
          ${isMine ? '<div class="podium-du">DU</div>' : ''}
          <div class="podium-rank">${rank}</div>
          <div class="podium-dot" style="background:${color}"></div>
          <div class="podium-name">${e.name}</div>
          <div class="podium-pts">${pts} pts</div>
        </div>`;
    }

    const podiumHtml = `
      <div class="card" style="--card-pad:16px">
        <div class="podium-wrap">
          ${podiumBlock(top3[1], 2)}
          ${podiumBlock(top3[0], 1)}
          ${podiumBlock(top3[2], 3)}
        </div>
    `;

    // Compact list for remaining entries
    const restHtml = entries.slice(3).map((e, i) => {
      const rank   = i + 4;
      const nb     = NEIGHBOURHOODS.find(n => n.id === e.id);
      const color  = e.color || nb?.color || '#1D9E75';
      const isMine = e.id === myNhId;
      const pts    = e.weekly_points || 0;
      const pct    = Math.round(pts / leader * 100);
      const gap    = leader - pts;
      return `
        <div class="lb-compact-row${isMine?' mine':''}"
             onclick="location.href='neighbourhood.html?id=${e.id}&name=${encodeURIComponent(e.name)}'"
             style="cursor:pointer">
          <div class="lb-compact-rank">${rank}</div>
          <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
          <div class="lb-compact-info">
            <div class="lb-compact-name">
              ${e.name}
              ${isMine ? '<span class="podium-du" style="font-size:8px">DU</span>' : ''}
            </div>
            <div class="lb-compact-behind">${gap > 0 ? gap.toLocaleString('sv-SE') + ' pts bakom ledaren' : 'Leder!'}</div>
            <div class="lb-bar-wrap">
              <div class="lb-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="lb-compact-pts">${pts.toLocaleString('sv-SE')}</div>
        </div>`;
    }).join('');

    container.innerHTML = podiumHtml +
      (entries.length > 3 ? `<div class="lb-compact-list" style="margin-top:8px">${restHtml}</div>` : '') +
      `</div>`;
  }

  await render();

  sb.channel('lb-live')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'workouts' }, render)
    .subscribe();
})();
</script>
</body>
</html>
