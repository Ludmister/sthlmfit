<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="dark-page">
  <svg class="skyline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" preserveAspectRatio="xMidYMax slice">
    <!-- Stockholm skyline silhouette: Stadshuset tower (left), Gamla Stan spire (center), Norrmalm (right) -->
    <path fill="#1A2E42" d="
      M0,200 L0,158
      L22,158 L22,148 L38,148 L38,140 L50,140
      L50,92 L53,92 L53,48 L55,40 L57,26 L59,14 L61,14
      L63,26 L65,40 L67,48 L67,92
      L82,92 L82,108 L95,108 L95,120 L112,120
      L112,135 L130,135 L130,145 L150,145
      L150,140 L162,140 L162,125
      L175,125 L175,112 L188,112 L188,118
      L195,118 L195,102 L205,102 L205,90
      L210,75 L213,55 L215,32 L217,55 L219,75
      L219,90 L228,90 L228,102 L242,102 L242,115
      L258,115 L258,105 L272,105
      L272,88 L290,88 L290,98
      L305,98 L305,80 L325,80 L325,95 L342,95
      L342,68 L362,68 L362,95
      L378,95 L378,108 L398,108 L398,118
      L420,118 L420,128 L448,128 L448,136
      L478,136 L478,142 L515,142 L515,146
      L558,146 L558,150 L610,150 L610,153
      L800,153 L800,200 Z"/>
    <!-- Mälaren water line -->
    <path fill="#1A2E42" opacity="0.4"
      d="M0,157 Q200,153 400,158 Q600,162 800,156 L800,167 Q600,170 400,165 Q200,160 0,164 Z"/>
  </svg>

  <div class="content">
    <div class="wordmark" style="margin-bottom:20px">Sthlm<span>Fit</span></div>
    <h1 class="dark-headline">Välkommen tillbaka</h1>

    <div class="card">
      <div class="alert alert-error" id="err"></div>

      <div id="login-form">
        <div class="field">
          <label class="field-label">E-post</label>
          <input type="email" class="input" id="email" placeholder="din@email.se" autocomplete="email" />
        </div>
        <div class="field" style="margin-bottom:6px">
          <label class="field-label">Lösenord</label>
          <input type="password" class="input" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="link-muted" id="forgot-toggle" style="display:block;text-align:right;margin-bottom:18px">Glömt lösenord?</button>
        <button class="btn btn-primary" id="login-btn">Logga in</button>
      </div>

      <div id="forgot-panel" style="display:none">
        <div style="font-size:15px;font-weight:700;margin-bottom:10px">Återställ lösenord</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:18px">
          Kontakta oss på <a href="mailto:sthlmfit@gmail.com" style="color:var(--green);font-weight:600;text-decoration:none">sthlmfit@gmail.com</a> så hjälper vi dig återställa ditt lösenord.
        </div>
        <button class="btn btn-outline" id="forgot-back">Tillbaka</button>
      </div>

      <div id="signup-form" style="display:none">
        <div style="font-size:17px;font-weight:800;margin-bottom:16px">Skapa konto</div>
        <div class="field">
          <label class="field-label">E-post</label>
          <input type="email" class="input" id="su-email" placeholder="din@email.se" />
        </div>
        <div class="field" style="margin-bottom:18px">
          <label class="field-label">Lösenord</label>
          <input type="password" class="input" id="su-password" placeholder="Minst 6 tecken" />
        </div>
        <button class="btn btn-primary" id="signup-btn">Skapa konto</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px">
      <button class="link-btn" id="toggle-mode">Inget konto? Skapa ett</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { const p = await getProfile(session.user.id); location.href = p ? 'dashboard.html' : 'onboarding.html'; }
})();

const errEl = document.getElementById('err');
function showErr(msg) { errEl.textContent = msg; errEl.className = 'alert alert-error show'; }
function clearErr()   { errEl.className = 'alert alert-error'; }

async function doLogin() {
  clearErr();
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  if (!email || !pw) { showErr('Fyll i e-post och lösenord.'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Loggar in…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Logga in'; return; }
  const profile = await getProfile(data.user.id);
  // Kick off Strava sync in background using keepalive so it survives navigation
  if (profile?.strava_connected) {
    fetch(`${SUPABASE_URL}/functions/v1/strava-sync`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${data.session.access_token}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: '{}',
      keepalive: true,
    }).catch(() => {});
  }
  location.href = profile ? 'dashboard.html' : 'onboarding.html';
}
document.getElementById('login-btn').addEventListener('click', doLogin);
['email','password'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); }));

document.getElementById('forgot-toggle').addEventListener('click', () => {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('forgot-panel').style.display = 'block';
  clearErr();
});
document.getElementById('forgot-back').addEventListener('click', () => {
  document.getElementById('forgot-panel').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
});

let signupMode = false;
document.getElementById('toggle-mode').addEventListener('click', () => {
  signupMode = !signupMode;
  document.getElementById('login-form').style.display  = signupMode ? 'none'  : 'block';
  document.getElementById('signup-form').style.display = signupMode ? 'block' : 'none';
  document.getElementById('forgot-panel').style.display = 'none';
  document.getElementById('toggle-mode').textContent = signupMode ? 'Har konto? Logga in' : 'Inget konto? Skapa ett';
  clearErr();
});

document.getElementById('signup-btn').addEventListener('click', async () => {
  clearErr();
  const email = document.getElementById('su-email').value.trim();
  const pw    = document.getElementById('su-password').value;
  if (!email || !pw) { showErr('Fyll i alla fält.'); return; }
  if (pw.length < 6) { showErr('Lösenordet måste vara minst 6 tecken.'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Skapar konto…';
  const { error } = await sb.auth.signUp({ email, password: pw });
  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Skapa konto'; return; }
  location.href = 'onboarding.html';
});
</script>
</body>
</html>
