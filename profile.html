<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Profil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-wordmark">Sthlm<span>Fit</span></div>
      <button class="link-muted" id="logout-btn">Logga ut</button>
    </div>
  </div>

  <div class="page" id="content">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='dashboard.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <button class="nav-tab active" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user    = await requireAuth();
  if (!user) return;
  const profile = await getProfile(user.id);
  if (!profile)  { location.href = 'onboarding.html'; return; }

  const nhColor = profile.neighbourhoods?.color || '#1D9E75';
  const nhName  = profile.neighbourhoods?.name  || '–';

  // Weekly & total km
  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
  })();

  const { data: allWo }  = await sb.from('workouts').select('km').eq('user_id', user.id);
  const { data: weekWo } = await sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart);
  const totalKm = (allWo  || []).reduce((s, w) => s + Number(w.km), 0);
  const weekKm  = (weekWo || []).reduce((s, w) => s + Number(w.km), 0);

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div style="width:60px;height:60px;border-radius:50%;background:${nhColor}20;border:2px solid ${nhColor}40;
           display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:${nhColor};flex-shrink:0">
        ${(profile.name || '?')[0].toUpperCase()}
      </div>
      <div>
        <div style="font-size:20px;font-weight:800;line-height:1.2">${profile.name || '(Ej satt)'}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <div style="width:8px;height:8px;border-radius:50%;background:${nhColor}"></div>
          <div style="font-size:13px;color:var(--text-muted);font-weight:500">${nhName}</div>
        </div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-val">${weekKm.toFixed(1).replace('.',',')}</div>
        <div class="stat-lbl">km denna vecka</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${totalKm.toFixed(0)}</div>
        <div class="stat-lbl">km totalt</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Redigera profil</div>
      <div class="field">
        <label class="field-label">Namn</label>
        <input type="text" class="input" id="edit-name" value="${profile.name || ''}" />
      </div>
      <div class="field-label" style="margin-bottom:8px">Stadsdel</div>
      <div class="nh-grid" id="nh-grid"></div>
      <button class="btn btn-primary" id="save-btn" style="margin-top:16px">
        <i class="ti ti-check"></i> Spara ändringar
      </button>
      <div class="alert" id="save-msg" style="margin-top:12px"></div>
    </div>

    <button class="btn btn-outline btn-full" id="logout-btn2" style="margin-top:12px">
      <i class="ti ti-logout"></i> Logga ut
    </button>
  `;

  // Build nh grid
  let selectedNh = profile.neighbourhood_id;
  const grid = document.getElementById('nh-grid');
  NEIGHBOURHOODS.forEach(nh => {
    const card = document.createElement('button');
    card.className = 'nh-card' + (nh.id === selectedNh ? ' selected' : '');
    card.innerHTML = `<div class="nh-dot" style="background:${nh.color}"></div><div class="nh-name">${nh.name}</div>`;
    card.addEventListener('click', () => {
      selectedNh = nh.id;
      grid.querySelectorAll('.nh-card').forEach(c => c.classList.toggle('selected', c === card));
    });
    grid.appendChild(card);
  });

  // Save
  document.getElementById('save-btn').addEventListener('click', async () => {
    const name = document.getElementById('edit-name').value.trim();
    const btn  = document.getElementById('save-btn');
    const msg  = document.getElementById('save-msg');
    btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Sparar…';
    const { error } = await sb.from('profiles').update({ name, neighbourhood_id: selectedNh }).eq('id', user.id);
    if (error) {
      msg.textContent = error.message; msg.className = 'alert alert-error show';
    } else {
      msg.textContent = 'Sparat!'; msg.className = 'alert alert-success show';
      setTimeout(() => { msg.className = 'alert'; }, 2500);
    }
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Spara ändringar';
  });

  // Logout
  async function doLogout() {
    await sb.auth.signOut(); location.href = 'login.html';
  }
  document.getElementById('logout-btn').addEventListener('click', doLogout);
  document.getElementById('logout-btn2').addEventListener('click', doLogout);
})();
</script>
</body>
</html>
