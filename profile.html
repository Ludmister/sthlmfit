<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Profil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-wordmark">Sthlm<span>Fit</span></div>
      <button class="link-muted" id="logout-btn">Logga ut</button>
    </div>
  </div>

  <div class="page" id="content">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='dashboard.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <button class="nav-tab active" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user    = await requireAuth();
  if (!user) return;
  const profile = await getProfile(user.id);
  if (!profile)  { location.href = 'onboarding.html'; return; }

  const nhColor = profile.neighbourhoods?.color || '#1D9E75';
  const nhName  = profile.neighbourhoods?.name  || '–';

  // Weekly & total km
  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
  })();

  const { data: allWo }  = await sb.from('workouts').select('km').eq('user_id', user.id);
  const { data: weekWo } = await sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart);
  const totalKm = (allWo  || []).reduce((s, w) => s + Number(w.km), 0);
  const weekKm  = (weekWo || []).reduce((s, w) => s + Number(w.km), 0);

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div style="width:60px;height:60px;border-radius:50%;background:${nhColor}20;border:2px solid ${nhColor}40;
           display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:${nhColor};flex-shrink:0">
        ${(profile.name || '?')[0].toUpperCase()}
      </div>
      <div>
        <div style="font-size:20px;font-weight:800;line-height:1.2">${profile.name || '(Ej satt)'}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <div style="width:8px;height:8px;border-radius:50%;background:${nhColor}"></div>
          <div style="font-size:13px;color:var(--text-muted);font-weight:500">${nhName}</div>
        </div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-val">${weekKm.toFixed(1).replace('.',',')}</div>
        <div class="stat-lbl">km denna vecka</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${totalKm.toFixed(0)}</div>
        <div class="stat-lbl">km totalt</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Redigera profil</div>
      <div class="field">
        <label class="field-label">Namn</label>
        <input type="text" class="input" id="edit-name" value="${profile.name || ''}" />
      </div>
      <div class="field-label" style="margin-bottom:8px">Stadsdel</div>
      <div class="nh-grid" id="nh-grid"></div>
      <button class="btn btn-primary" id="save-btn" style="margin-top:16px">
        <i class="ti ti-check"></i> Spara ändringar
      </button>
      <div class="alert" id="save-msg" style="margin-top:12px"></div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title" style="display:flex;align-items:center;gap:6px">
        <i class="ti ti-brand-strava" style="color:#FC4C02"></i>Strava
      </div>
      ${profile.strava_connected ? `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div style="width:40px;height:40px;border-radius:50%;background:#FC4C0218;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="ti ti-brand-strava" style="color:#FC4C02;font-size:20px"></i>
          </div>
          <div>
            <div style="font-weight:700">${profile.strava_athlete_name || 'Strava-användare'}</div>
            <div style="font-size:13px;color:var(--text-muted)" id="strava-sync-info">Laddar…</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" id="strava-sync-btn" style="flex:1;padding:10px">
            <i class="ti ti-refresh"></i> Synka nu
          </button>
          <button class="btn btn-outline" id="strava-disconnect-btn" style="flex:1;padding:10px;color:var(--text-muted)">
            Koppla från
          </button>
        </div>
        <div class="alert" id="strava-msg" style="margin-top:10px"></div>
      ` : `
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:14px;line-height:1.5">
          Koppla ditt Strava-konto för att synka löppass automatiskt.
        </div>
        <a href="${STRAVA_AUTH_URL}" class="btn btn-primary"
           style="background:#FC4C02;border:none;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none">
          <i class="ti ti-brand-strava" style="font-size:18px"></i> Koppla med Strava
        </a>
      `}
    </div>

    <button class="btn btn-outline btn-full" id="logout-btn2" style="margin-top:12px">
      <i class="ti ti-logout"></i> Logga ut
    </button>
  `;

  // Build nh grid
  let selectedNh = profile.neighbourhood_id;
  const grid = document.getElementById('nh-grid');
  NEIGHBOURHOODS.forEach(nh => {
    const card = document.createElement('button');
    card.className = 'nh-card' + (nh.id === selectedNh ? ' selected' : '');
    card.innerHTML = `<div class="nh-dot" style="background:${nh.color}"></div><div class="nh-name">${nh.name}</div>`;
    card.addEventListener('click', () => {
      selectedNh = nh.id;
      grid.querySelectorAll('.nh-card').forEach(c => c.classList.toggle('selected', c === card));
    });
    grid.appendChild(card);
  });

  // Save
  document.getElementById('save-btn').addEventListener('click', async () => {
    const name = document.getElementById('edit-name').value.trim();
    const btn  = document.getElementById('save-btn');
    const msg  = document.getElementById('save-msg');
    btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Sparar…';
    const { error } = await sb.from('profiles').update({ name, neighbourhood_id: selectedNh }).eq('id', user.id);
    if (error) {
      msg.textContent = error.message; msg.className = 'alert alert-error show';
    } else {
      msg.textContent = 'Sparat!'; msg.className = 'alert alert-success show';
      setTimeout(() => { msg.className = 'alert'; }, 2500);
    }
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Spara ändringar';
  });

  // Strava section
  if (profile.strava_connected) {
    // Show last sync time
    const { data: tokens } = await sb.from('strava_tokens').select('last_sync').eq('user_id', user.id).maybeSingle();
    const syncInfoEl = document.getElementById('strava-sync-info');
    if (syncInfoEl) {
      if (tokens?.last_sync) {
        const d = new Date(tokens.last_sync);
        syncInfoEl.textContent = 'Synkad ' + d.toLocaleDateString('sv-SE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      } else {
        syncInfoEl.textContent = 'Aldrig synkad';
      }
    }

    // Manual sync button
    const syncBtn = document.getElementById('strava-sync-btn');
    const stravaMsg = document.getElementById('strava-msg');
    if (syncBtn) {
      syncBtn.addEventListener('click', async () => {
        syncBtn.disabled = true;
        syncBtn.innerHTML = '<i class="ti ti-loader-2"></i> Synkar…';
        const { data: sd, error: se } = await sb.functions.invoke('strava-sync');
        syncBtn.disabled = false;
        syncBtn.innerHTML = '<i class="ti ti-refresh"></i> Synka nu';
        if (se || sd?.error) {
          stravaMsg.textContent = sd?.error || se?.message;
          stravaMsg.className = 'alert alert-error show';
        } else if (sd?.skipped) {
          stravaMsg.textContent = 'Redan synkad nyligen.';
          stravaMsg.className = 'alert alert-success show';
        } else {
          stravaMsg.textContent = sd.synced > 0 ? `${sd.synced} nya löppass synkades!` : 'Inga nya löppass.';
          stravaMsg.className = 'alert alert-success show';
        }
        setTimeout(() => { stravaMsg.className = 'alert'; }, 3000);
      });
    }

    // Disconnect button
    const disconnectBtn = document.getElementById('strava-disconnect-btn');
    if (disconnectBtn) {
      disconnectBtn.addEventListener('click', async () => {
        if (!confirm('Koppla från Strava? Dina loggade löppass påverkas inte.')) return;
        disconnectBtn.disabled = true;
        await sb.from('strava_tokens').delete().eq('user_id', user.id);
        await sb.from('profiles').update({ strava_connected: false, strava_athlete_name: null }).eq('id', user.id);
        location.reload();
      });
    }
  }

  // Logout
  async function doLogout() {
    await sb.auth.signOut(); location.href = 'login.html';
  }
  document.getElementById('logout-btn').addEventListener('click', doLogout);
  document.getElementById('logout-btn2').addEventListener('click', doLogout);
})();
</script>
</body>
</html>
