<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0D1B2A; }
    #map { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .leaflet-container { font-family: 'Inter', sans-serif !important; width: 100% !important; height: 100% !important; }
    .leaflet-popup-content-wrapper {
      background: rgba(13,27,42,0.95);
      color: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }
    .leaflet-popup-tip { background: rgba(13,27,42,0.95); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 18px !important; }
    .map-popup-name  { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .map-popup-km    { font-size: 22px; font-weight: 900; color: var(--green); line-height: 1; }
    .map-popup-rank  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-weight: 600; }
    .map-popup-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    #loading {
      position: fixed; inset: 0; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .card-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.22);
      border-radius: 99px;
      margin: 0 auto 18px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="loading">
  <div style="text-align:center">
    <div class="wordmark" style="margin-bottom:24px">Sthlm<span>Fit</span></div>
    <div class="spinner" style="margin:0 auto"></div>
  </div>
</div>

<div class="map-ui">

  <button class="map-btn" onclick="location.href='profile.html'"
    style="top:calc(16px + env(safe-area-inset-top)); left:16px">
    <i class="ti ti-user"></i>
  </button>

  <button class="map-btn" onclick="location.href='leaderboard.html'"
    style="top:calc(16px + env(safe-area-inset-top)); right:16px">
    <i class="ti ti-trophy"></i>
  </button>

  <div class="map-bottom-card" id="bottom-card" style="display:none">
    <div class="card-handle"></div>
    <div class="map-stat-grid" id="stat-grid"></div>
    <div id="card-footer" style="padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
const GEO = { type:'FeatureCollection', features:[
  // 1: Södermalm — large island south of Gamla Stan
  {type:'Feature',properties:{id:1},geometry:{type:'Polygon',coordinates:[[[
    18.018,59.320],[18.032,59.322],[18.048,59.322],[18.062,59.322],[18.080,59.320],
    [18.095,59.318],[18.103,59.313],[18.105,59.306],[18.102,59.299],[18.090,59.294],
    [18.072,59.291],[18.052,59.291],[18.034,59.295],[18.020,59.302],[18.013,59.310],
    [18.015,59.316],[18.018,59.320
  ]]]}},
  // 2: Vasastan — north of Norrmalm
  {type:'Feature',properties:{id:2},geometry:{type:'Polygon',coordinates:[[[
    18.030,59.332],[18.044,59.330],[18.058,59.330],[18.070,59.331],[18.076,59.334],
    [18.074,59.342],[18.069,59.351],[18.063,59.358],[18.055,59.364],[18.044,59.364],
    [18.036,59.360],[18.031,59.350],[18.028,59.340],[18.030,59.332
  ]]]}},
  // 3: Östermalm — east, including Djurgårdsbrunnsviken edge
  {type:'Feature',properties:{id:3},geometry:{type:'Polygon',coordinates:[[[
    18.076,59.334],[18.084,59.331],[18.096,59.329],[18.108,59.328],[18.118,59.330],
    [18.124,59.336],[18.122,59.344],[18.116,59.350],[18.108,59.354],[18.096,59.354],
    [18.086,59.349],[18.079,59.344],[18.076,59.338],[18.076,59.334
  ]]]}},
  // 4: Kungsholmen — island to the west, follow water edges
  {type:'Feature',properties:{id:4},geometry:{type:'Polygon',coordinates:[[[
    17.998,59.322],[18.010,59.318],[18.022,59.317],[18.035,59.319],[18.044,59.324],
    [18.046,59.330],[18.044,59.336],[18.036,59.341],[18.022,59.342],[18.010,59.340],
    [17.999,59.336],[17.992,59.330],[17.993,59.325],[17.998,59.322
  ]]]}},
  // 5: Gamla Stan — small island in the centre
  {type:'Feature',properties:{id:5},geometry:{type:'Polygon',coordinates:[[[
    18.064,59.325],[18.068,59.322],[18.073,59.321],[18.077,59.322],[18.079,59.325],
    [18.079,59.328],[18.076,59.330],[18.070,59.331],[18.065,59.329],[18.063,59.327],
    [18.064,59.325
  ]]]}},
  // 6: Norrmalm — city centre
  {type:'Feature',properties:{id:6},geometry:{type:'Polygon',coordinates:[[[
    18.042,59.326],[18.054,59.323],[18.064,59.323],[18.076,59.325],[18.080,59.328],
    [18.076,59.334],[18.070,59.331],[18.058,59.330],[18.044,59.330],[18.038,59.328],
    [18.039,59.326],[18.042,59.326
  ]]]}},
  // 7: Hammarby Sjöstad — southeast
  {type:'Feature',properties:{id:7},geometry:{type:'Polygon',coordinates:[[[
    18.088,59.303],[18.099,59.299],[18.110,59.298],[18.122,59.299],[18.132,59.302],
    [18.136,59.308],[18.132,59.314],[18.120,59.316],[18.106,59.315],[18.094,59.312],
    [18.087,59.307],[18.088,59.303
  ]]]}},
  // 8: Liljeholmen — southwest
  {type:'Feature',properties:{id:8},geometry:{type:'Polygon',coordinates:[[[
    17.988,59.307],[18.002,59.301],[18.015,59.298],[18.028,59.300],[18.036,59.306],
    [18.036,59.313],[18.030,59.319],[18.018,59.322],[18.006,59.322],[17.995,59.318],
    [17.987,59.313],[17.988,59.307
  ]]]}},
  // 9: Lidingö — island to the east
  {type:'Feature',properties:{id:9},geometry:{type:'Polygon',coordinates:[[[
    18.122,59.343],[18.136,59.339],[18.152,59.338],[18.168,59.341],[18.179,59.348],
    [18.178,59.358],[18.170,59.366],[18.156,59.373],[18.138,59.373],[18.124,59.366],
    [18.117,59.356],[18.119,59.348],[18.122,59.343
  ]]]}},
  // 10: Djurgården — narrow peninsula to the east
  {type:'Feature',properties:{id:10},geometry:{type:'Polygon',coordinates:[[[
    18.090,59.333],[18.100,59.329],[18.112,59.326],[18.126,59.325],[18.140,59.326],
    [18.154,59.329],[18.162,59.333],[18.158,59.337],[18.146,59.340],[18.130,59.341],
    [18.114,59.339],[18.100,59.337],[18.090,59.333
  ]]]}}
]};

function kmOpacity(km) {
  if (!km || km <= 0) return 0.30;
  if (km <= 15)       return 0.50;
  if (km <= 40)       return 0.68;
  if (km <= 80)       return 0.84;
  return 0.95;
}

(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile = await getProfile(user.id);
  if (!profile) { location.href = 'onboarding.html'; return; }

  const myNhId    = profile.neighbourhood_id;
  const myNhColor = profile.neighbourhoods?.color || '#1D9E75';
  const myNhName  = profile.neighbourhoods?.name  || '–';

  if (profile.strava_connected) sb.functions.invoke('strava-sync').catch(() => {});

  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const map = L.map('map', {
    zoomControl: false, scrollWheelZoom: true, attributionControl: true,
  }).setView([59.3293, 18.0686], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 16,
  }).addTo(map);

  map.invalidateSize();

  const layerMap = {};
  GEO.features.forEach(f => {
    const nhId  = f.properties.id;
    const nb    = NEIGHBOURHOODS.find(n => n.id === nhId);
    if (!nb) return;
    const isMine = nhId === myNhId;
    const layer = L.geoJSON(f, {
      style: { fillColor: nb.color, fillOpacity: 0.30, color: nb.color, weight: isMine ? 2.5 : 1, opacity: isMine ? 1 : 0.75 }
    }).addTo(map);

    const layerRef = { layer, nb, isMine, currentOpacity: 0.30 };
    layerMap[nhId] = layerRef;

    layer.bindPopup('', { maxWidth:190 });
    layer.on('click', () => layer.openPopup());
    layer.on('mouseover', () => !isMine && layer.setStyle({ fillOpacity: Math.min(layerRef.currentOpacity + 0.18, 1) }));
    layer.on('mouseout',  () => !isMine && layer.setStyle({ fillOpacity: layerRef.currentOpacity }));
  });

  let pulse = true;
  setInterval(() => {
    pulse = !pulse;
    const mine = layerMap[myNhId];
    if (mine) mine.layer.setStyle({ color: pulse ? myNhColor : 'rgba(255,255,255,0.3)', weight: pulse ? 3 : 1.5 });
  }, 900);

  async function updateData() {
    const [lbRes, myWoRes] = await Promise.all([
      sb.from('weekly_km').select('*'),
      sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart),
    ]);

    const entries   = lbRes.data || [];
    const myKm      = (myWoRes.data || []).reduce((s, w) => s + Number(w.km), 0);
    const myRow     = entries.find(e => e.id === myNhId);
    const myRank    = entries.findIndex(e => e.id === myNhId) + 1;
    const isLeading = myRank === 1 && (myRow?.total_km || 0) > 0;

    entries.forEach((e, i) => {
      const ref = layerMap[e.id];
      if (!ref) return;
      ref.currentOpacity = kmOpacity(e.total_km);
      ref.layer.setStyle({ fillOpacity: ref.currentOpacity });
      ref.layer.setPopupContent(`
        <div class="map-popup-name">${ref.nb.name}</div>
        <div class="map-popup-km">${Number(e.total_km).toFixed(1).replace('.',',')} km</div>
        <div class="map-popup-rank">#${i+1} denna vecka</div>
        <div class="map-popup-sub">${e.active_runners} aktiva löpare</div>
      `);
    });

    document.getElementById('stat-grid').innerHTML = `
      <div>
        <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.2">${myNhName}</div>
        <div class="map-stat-label">Din stadsdel</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:48px;font-weight:900;line-height:1;letter-spacing:-3px;color:${isLeading?'var(--gold)':'#fff'}">#${myRank||'–'}</div>
        <div class="map-stat-label">Din rank</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:24px;font-weight:800;color:var(--green);line-height:1.1">${myKm.toFixed(1).replace('.',',')} km</div>
        <div class="map-stat-label">Denna vecka</div>
      </div>
    `;

    document.getElementById('card-footer').innerHTML = profile.strava_connected
      ? `<div style="display:flex;align-items:center;gap:7px">
           <i class="ti ti-brand-strava" style="color:var(--strava);font-size:16px"></i>
           <span style="font-size:13px;font-weight:600;color:var(--strava)">Strava kopplad</span>
         </div>`
      : `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
           <span style="font-size:12px;color:rgba(255,255,255,0.45);font-weight:500">Ingen Strava-koppling</span>
           <a href="log.html" style="font-size:13px;font-weight:700;color:var(--green);text-decoration:none">
             Logga km manuellt →
           </a>
         </div>`;

    document.getElementById('bottom-card').style.display = 'block';
    document.getElementById('loading').classList.add('hidden');
  }

  await updateData();

  sb.channel('dashboard-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'workouts' }, () => updateData())
    .subscribe();
})();
</script>
</body>
</html>
