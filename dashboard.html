<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0D1B2A; }
    #map { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .leaflet-container { font-family: 'Inter', sans-serif !important; width: 100% !important; height: 100% !important; }
    .leaflet-popup-content-wrapper {
      background: rgba(13,27,42,0.95);
      color: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }
    .leaflet-popup-tip { background: rgba(13,27,42,0.95); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 18px !important; }
    .map-popup-name  { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .map-popup-km    { font-size: 22px; font-weight: 900; color: var(--green); line-height: 1; }
    .map-popup-rank  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-weight: 600; }
    .map-popup-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    #loading {
      position: fixed; inset: 0; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .card-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.22);
      border-radius: 99px;
      margin: 0 auto 18px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="loading">
  <div style="text-align:center">
    <div class="wordmark" style="margin-bottom:24px">Sthlm<span>Fit</span></div>
    <div class="spinner" style="margin:0 auto"></div>
  </div>
</div>

<div class="map-ui">

  <button class="map-btn" onclick="location.href='profile.html'"
    style="top:calc(16px + env(safe-area-inset-top)); left:16px">
    <i class="ti ti-user"></i>
  </button>

  <button class="map-btn" onclick="location.href='leaderboard.html'"
    style="top:calc(16px + env(safe-area-inset-top)); right:16px">
    <i class="ti ti-trophy"></i>
  </button>

  <div class="map-bottom-card" id="bottom-card" style="display:none">
    <div class="card-handle"></div>
    <div class="attack-banner" id="attack-banner" onclick="location.href='leaderboard.html'">
      <i class="ti ti-alert-triangle"></i>
      <span id="attack-text"></span>
    </div>
    <div class="map-stat-grid" id="stat-grid"></div>
    <div id="card-footer" style="padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
let GEO = null; // loaded from neighbourhoods.geojson

function kmOpacity(km) {
  if (!km || km <= 0) return 0.30;
  if (km <= 15)       return 0.50;
  if (km <= 40)       return 0.68;
  if (km <= 80)       return 0.84;
  return 0.95;
}

(async () => {
  const [geoRes, user] = await Promise.all([
    fetch('neighbourhoods.geojson').then(r => r.json()),
    requireAuth(),
  ]);
  if (!user) return;
  GEO = geoRes;

  const profile = await getProfile(user.id);
  if (!profile) { location.href = 'onboarding.html'; return; }

  const myNhId    = profile.neighbourhood_id;
  const myNhColor = profile.neighbourhoods?.color || '#1D9E75';
  const myNhName  = profile.neighbourhoods?.name  || '–';

  // Apply neighbourhood theme
  const _c = myNhColor.replace('#','');
  document.body.style.setProperty('--hood-color', myNhColor);
  document.body.style.setProperty('--hood-rgb',
    `${parseInt(_c.slice(0,2),16)},${parseInt(_c.slice(2,4),16)},${parseInt(_c.slice(4,6),16)}`);

  if (profile.strava_connected) sb.functions.invoke('strava-sync').catch(() => {});

  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const map = L.map('map', {
    zoomControl: false, scrollWheelZoom: true, attributionControl: true,
  }).setView([59.3293, 18.0686], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 16,
  }).addTo(map);

  map.invalidateSize();

  const layerMap = {};
  GEO.features.forEach(f => {
    const nhId  = f.properties.id;
    const nb    = NEIGHBOURHOODS.find(n => n.id === nhId);
    if (!nb) return;
    const isMine = nhId === myNhId;
    const layer = L.geoJSON(f, {
      style: {
        fillColor:    nb.color,
        fillOpacity:  isMine ? 0.22 : 0.10,
        color:        nb.color,
        weight:       isMine ? 3 : 1.5,
        opacity:      isMine ? 1 : 0.65,
      }
    }).addTo(map);

    const layerRef = { layer, nb, isMine, baseFillOpacity: isMine ? 0.22 : 0.10 };
    layerMap[nhId] = layerRef;

    layer.bindPopup('', { maxWidth:190 });
    layer.on('click', () => layer.openPopup());
    layer.on('mouseover', () => layer.setStyle({ fillOpacity: Math.min(layerRef.baseFillOpacity + 0.15, 0.5) }));
    layer.on('mouseout',  () => layer.setStyle({ fillOpacity: layerRef.baseFillOpacity }));
  });

  let pulse = true;
  setInterval(() => {
    pulse = !pulse;
    const mine = layerMap[myNhId];
    if (mine) mine.layer.setStyle({ color: pulse ? myNhColor : 'rgba(255,255,255,0.25)', weight: pulse ? 3.5 : 2 });
  }, 900);

  async function updateData() {
    const [lbRes, myWoRes] = await Promise.all([
      sb.from('weekly_km').select('*'),
      sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart),
    ]);

    const entries   = lbRes.data || [];
    const myKm      = (myWoRes.data || []).reduce((s, w) => s + Number(w.km), 0);
    const myRow     = entries.find(e => e.id === myNhId);
    const myRank    = entries.findIndex(e => e.id === myNhId) + 1;
    const isLeading = myRank === 1 && (myRow?.total_km || 0) > 0;

    entries.forEach((e, i) => {
      const ref = layerMap[e.id];
      if (!ref) return;
      ref.baseFillOpacity = ref.isMine
        ? Math.max(0.22, kmOpacity(e.total_km) * 0.4)
        : kmOpacity(e.total_km) * 0.22;
      ref.layer.setStyle({ fillOpacity: ref.baseFillOpacity });
      ref.layer.setPopupContent(`
        <div class="map-popup-name">${ref.nb.name}</div>
        <div class="map-popup-km">${Number(e.total_km).toFixed(1).replace('.',',')} km</div>
        <div class="map-popup-rank">#${i+1} denna vecka</div>
        <div class="map-popup-sub">${e.active_runners} aktiva löpare</div>
      `);
    });

    document.getElementById('stat-grid').innerHTML = `
      <div>
        <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.2">${myNhName}</div>
        <div class="map-stat-label">Din stadsdel</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:48px;font-weight:900;line-height:1;letter-spacing:-3px;color:var(--hood-color)">#${myRank||'–'}</div>
        <div class="map-stat-label">Din rank</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:24px;font-weight:800;color:var(--hood-color);line-height:1.1">${myKm.toFixed(1).replace('.',',')} km</div>
        <div class="map-stat-label">Denna vecka</div>
      </div>
    `;

    // Attack warning banner
    const banner   = document.getElementById('attack-banner');
    const myNhKm   = Number(myRow?.total_km || 0);
    let attackMsg  = null;
    if (myNhKm > 0) {
      if (isLeading) {
        const rival = entries[1];
        if (rival) {
          const gap = myNhKm - Number(rival.total_km || 0);
          if (gap <= 15) attackMsg = `${rival.name} är bara ${gap.toFixed(1).replace('.',',')} km bakom — spring nu!`;
        }
      } else {
        const leader = entries[0];
        if (leader) {
          const gap = Number(leader.total_km || 0) - myNhKm;
          if (gap <= 15) attackMsg = `Du är ${gap.toFixed(1).replace('.',',')} km från att ta #1 — spring nu!`;
        }
      }
    }
    if (attackMsg) {
      document.getElementById('attack-text').textContent = attackMsg;
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }

    document.getElementById('card-footer').innerHTML = profile.strava_connected
      ? `<div style="display:flex;align-items:center;gap:7px">
           <i class="ti ti-brand-strava" style="color:var(--strava);font-size:16px"></i>
           <span style="font-size:13px;font-weight:600;color:var(--strava)">Strava kopplad</span>
         </div>`
      : `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
           <span style="font-size:12px;color:rgba(255,255,255,0.45);font-weight:500">Ingen Strava-koppling</span>
           <a href="log.html" style="font-size:13px;font-weight:700;color:var(--hood-color);text-decoration:none">
             Logga km manuellt →
           </a>
         </div>`;

    document.getElementById('bottom-card').style.display = 'block';
    document.getElementById('loading').classList.add('hidden');
  }

  await updateData();

  sb.channel('dashboard-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'workouts' }, () => updateData())
    .subscribe();

  document.getElementById('logout-pill').addEventListener('click', async () => {
    await sb.auth.signOut(); location.href = 'login.html';
  });
})();
</script>

<button id="logout-pill" style="position:fixed;bottom:16px;left:16px;z-index:1000;display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(153,27,27,0.15);border:0.5px solid rgba(153,27,27,0.4);border-radius:99px;cursor:pointer;font-family:var(--font);font-size:12px;color:#FCA5A5">
  <i class="ti ti-logout" style="font-size:13px"></i> Logga ut
</button>
</body>
</html>
