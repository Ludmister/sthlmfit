<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
    .leaflet-container { font-family: 'Inter', sans-serif !important; }
    /* Dark-map popup style */
    .leaflet-popup-content-wrapper {
      background: rgba(13,27,42,0.95);
      color: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }
    .leaflet-popup-tip { background: rgba(13,27,42,0.95); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 18px !important; }
    .map-popup-name  { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .map-popup-km    { font-size: 22px; font-weight: 900; color: var(--green); line-height: 1; }
    .map-popup-rank  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-weight: 600; }
    .map-popup-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    /* Loading overlay */
    #loading {
      position: fixed; inset: 0; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Loading -->
<div id="loading">
  <div style="text-align:center">
    <div class="wordmark" style="margin-bottom:24px">Sthlm<span>Fit</span></div>
    <div class="spinner" style="margin:0 auto"></div>
  </div>
</div>

<!-- Floating UI layer -->
<div class="map-ui">

  <!-- Top-left: profile button -->
  <button class="map-btn" onclick="location.href='profile.html'"
    style="top:calc(16px + env(safe-area-inset-top)); left:16px">
    <i class="ti ti-user"></i>
  </button>

  <!-- Top-right: leaderboard button -->
  <button class="map-btn" onclick="location.href='leaderboard.html'"
    style="top:calc(16px + env(safe-area-inset-top)); right:16px">
    <i class="ti ti-trophy"></i>
  </button>

  <!-- Bottom card -->
  <div class="map-bottom-card" id="bottom-card" style="display:none">

    <div class="map-stat-grid" id="stat-grid">
      <!-- filled by JS -->
    </div>

    <div id="card-footer" style="padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)">
      <!-- strava badge or log link -->
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
const GEO = { type:'FeatureCollection', features:[
  {type:'Feature',properties:{id:1},geometry:{type:'Polygon',coordinates:[[[18.020,59.303],[18.108,59.303],[18.108,59.334],[18.060,59.340],[18.020,59.333],[18.020,59.303]]]}},
  {type:'Feature',properties:{id:2},geometry:{type:'Polygon',coordinates:[[[17.995,59.338],[18.063,59.338],[18.063,59.368],[17.995,59.368],[17.995,59.338]]]}},
  {type:'Feature',properties:{id:3},geometry:{type:'Polygon',coordinates:[[[18.055,59.328],[18.140,59.328],[18.140,59.372],[18.055,59.372],[18.055,59.328]]]}},
  {type:'Feature',properties:{id:4},geometry:{type:'Polygon',coordinates:[[[17.978,59.323],[18.048,59.323],[18.048,59.349],[17.978,59.349],[17.978,59.323]]]}},
  {type:'Feature',properties:{id:5},geometry:{type:'Polygon',coordinates:[[[18.060,59.317],[18.083,59.317],[18.083,59.330],[18.060,59.330],[18.060,59.317]]]}},
  {type:'Feature',properties:{id:6},geometry:{type:'Polygon',coordinates:[[[18.037,59.328],[18.078,59.328],[18.078,59.347],[18.037,59.347],[18.037,59.328]]]}},
  {type:'Feature',properties:{id:7},geometry:{type:'Polygon',coordinates:[[[18.072,59.292],[18.118,59.292],[18.118,59.320],[18.072,59.320],[18.072,59.292]]]}},
  {type:'Feature',properties:{id:8},geometry:{type:'Polygon',coordinates:[[[17.982,59.302],[18.040,59.302],[18.040,59.330],[17.982,59.330],[17.982,59.302]]]}},
  {type:'Feature',properties:{id:9},geometry:{type:'Polygon',coordinates:[[[18.110,59.342],[18.218,59.342],[18.218,59.402],[18.110,59.402],[18.110,59.342]]]}},
  {type:'Feature',properties:{id:10},geometry:{type:'Polygon',coordinates:[[[18.085,59.323],[18.172,59.323],[18.172,59.362],[18.085,59.362],[18.085,59.323]]]}},
]};

function kmColor(km) {
  if (!km || km <= 0) return '#2A3A4A';
  if (km <= 15)  return '#C0DD97';
  if (km <= 40)  return '#1D9E75';
  if (km <= 80)  return '#085041';
  return '#04342C';
}

(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile = await getProfile(user.id);
  if (!profile) { location.href = 'onboarding.html'; return; }

  const myNhId    = profile.neighbourhood_id;
  const myNhColor = profile.neighbourhoods?.color || '#1D9E75';
  const myNhName  = profile.neighbourhoods?.name  || '–';

  if (profile.strava_connected) sb.functions.invoke('strava-sync').catch(() => {});

  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
  })();

  // ── Map setup (once) ──────────────────────────────
  const map = L.map('map', {
    zoomControl: false, scrollWheelZoom: true, attributionControl: true,
  }).setView([59.329, 18.068], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 16,
  }).addTo(map);

  // Build layers (once)
  const layerMap = {};
  GEO.features.forEach(f => {
    const nhId  = f.properties.id;
    const nb    = NEIGHBOURHOODS.find(n => n.id === nhId);
    if (!nb) return;
    const isMine = nhId === myNhId;
    const layer = L.geoJSON(f, {
      style: { fillColor:'#2A3A4A', fillOpacity:0.6, color: isMine ? myNhColor : 'rgba(255,255,255,0.2)', weight: isMine ? 2.5 : 0.8 }
    }).addTo(map);

    layer.bindPopup('', { maxWidth:190 });
    layer.on('click', () => layer.openPopup());
    layer.on('mouseover', () => !isMine && layer.setStyle({ fillOpacity:0.8 }));
    layer.on('mouseout',  () => !isMine && layer.setStyle({ fillOpacity:0.6 }));

    layerMap[nhId] = { layer, nb, isMine };
  });

  // Pulse own neighbourhood border
  let pulse = true;
  setInterval(() => {
    pulse = !pulse;
    const mine = layerMap[myNhId];
    if (mine) mine.layer.setStyle({ color: pulse ? myNhColor : 'rgba(255,255,255,0.3)', weight: pulse ? 3 : 1.5 });
  }, 900);

  // ── Data + UI update ──────────────────────────────
  async function updateData() {
    const [lbRes, myWoRes] = await Promise.all([
      sb.from('weekly_km').select('*'),
      sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart),
    ]);

    const entries = lbRes.data || [];
    const myKm    = (myWoRes.data || []).reduce((s, w) => s + Number(w.km), 0);
    const myRow   = entries.find(e => e.id === myNhId);
    const myRank  = entries.findIndex(e => e.id === myNhId) + 1;
    const isLeading = myRank === 1 && (myRow?.total_km || 0) > 0;

    // Update polygon fill colors
    entries.forEach((e, i) => {
      const ref = layerMap[e.id];
      if (!ref) return;
      ref.layer.setStyle({ fillColor: kmColor(e.total_km) });
      ref.layer.setPopupContent(`
        <div class="map-popup-name">${ref.nb.name}</div>
        <div class="map-popup-km">${Number(e.total_km).toFixed(1).replace('.',',')} km</div>
        <div class="map-popup-rank">#${i+1} denna vecka</div>
        <div class="map-popup-sub">${e.active_runners} aktiva löpare</div>
      `);
    });

    // Update bottom card
    document.getElementById('stat-grid').innerHTML = `
      <div>
        <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.2">${myNhName}</div>
        <div class="map-stat-label">Din stadsdel</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:44px;font-weight:900;line-height:1;letter-spacing:-3px;color:${isLeading?'var(--gold)':'#fff'}">#${myRank||'–'}</div>
        <div class="map-stat-label">Din rank</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:800;color:var(--green);line-height:1.1">${myKm.toFixed(1).replace('.',',')} km</div>
        <div class="map-stat-label">Denna vecka</div>
      </div>
    `;

    document.getElementById('card-footer').innerHTML = profile.strava_connected
      ? `<div style="display:flex;align-items:center;gap:7px">
           <i class="ti ti-brand-strava" style="color:var(--strava);font-size:16px"></i>
           <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.55)">Strava kopplad</span>
         </div>`
      : `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
           <span style="font-size:12px;color:rgba(255,255,255,0.45);font-weight:500">Ingen Strava-koppling</span>
           <a href="log.html" style="font-size:13px;font-weight:700;color:var(--green);text-decoration:none">
             Logga km manuellt →
           </a>
         </div>`;

    document.getElementById('bottom-card').style.display = 'block';
    document.getElementById('loading').classList.add('hidden');
  }

  await updateData();

  // Realtime
  sb.channel('dashboard-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'workouts' }, () => updateData())
    .subscribe();
})();
</script>
</body>
</html>
