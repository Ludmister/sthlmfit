<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0D1B2A; }
    #map { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .leaflet-container { font-family: 'Inter', sans-serif !important; width: 100% !important; height: 100% !important; }
    .leaflet-popup-content-wrapper {
      background: rgba(13,27,42,0.95);
      color: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }
    .leaflet-popup-tip { background: rgba(13,27,42,0.95); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 18px !important; }
    .map-popup-name  { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .map-popup-km    { font-size: 22px; font-weight: 900; color: var(--green); line-height: 1; }
    .map-popup-rank  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-weight: 600; }
    .map-popup-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    #loading {
      position: fixed; inset: 0; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .card-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.22);
      border-radius: 99px;
      margin: 0 auto 18px;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-64px); }
    }
    @keyframes feedIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .feed-row { opacity:0; animation:feedIn 0.35s ease forwards; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="loading">
  <div style="text-align:center">
    <div class="wordmark" style="margin-bottom:24px">Sthlm<span>Fit</span></div>
    <div class="spinner" style="margin:0 auto"></div>
  </div>
</div>

<div class="map-ui">

  <button class="map-btn" onclick="location.href='profile.html'"
    style="top:calc(16px + env(safe-area-inset-top)); left:16px">
    <i class="ti ti-user"></i>
  </button>

  <button class="map-btn" onclick="location.href='leaderboard.html'"
    style="top:calc(16px + env(safe-area-inset-top)); right:16px">
    <i class="ti ti-trophy"></i>
  </button>

  <!-- Personal greeting — fades out after 4s -->
  <div id="greeting" style="position:fixed;top:calc(64px + env(safe-area-inset-top));left:12px;right:12px;z-index:90;pointer-events:none;opacity:0;transition:opacity 0.5s ease">
    <div id="greeting-text" style="background:rgba(10,22,36,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);text-align:center"></div>
  </div>

  <div class="map-bottom-card" id="bottom-card" style="display:none">
    <div class="card-handle"></div>
    <div class="attack-banner" id="attack-banner" onclick="location.href='leaderboard.html'">
      <i class="ti ti-alert-triangle"></i>
      <span id="attack-text"></span>
    </div>
    <div class="map-stat-grid" id="stat-grid"></div>
    <!-- Manual log widget — shown when Strava not connected -->
    <div id="log-widget" style="display:none;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px">Logga ditt löppass</div>
      <div style="display:flex;gap:8px;align-items:stretch">
        <div style="position:relative;flex:1">
          <input type="number" id="dash-km" min="0.1" max="100" step="0.1" inputmode="decimal" placeholder="0"
            style="width:100%;box-sizing:border-box;padding:10px 40px 10px 14px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:28px;font-weight:900;font-family:var(--font);outline:none;-webkit-appearance:none;appearance:none" />
          <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:600;color:rgba(255,255,255,0.35);pointer-events:none">km</span>
        </div>
        <button id="dash-log-btn" style="padding:0 20px;background:var(--hood-color);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;flex-shrink:0">
          Logga
        </button>
      </div>
      <div id="dash-log-msg" style="margin-top:7px;font-size:12px;min-height:16px"></div>
      <div style="margin-top:4px;font-size:12px;color:rgba(255,255,255,0.28)">
        <a href="profile.html" style="color:rgba(255,255,255,0.38);text-decoration:underline;text-underline-offset:2px">Koppla Strava</a> för automatisk synkning
      </div>
    </div>

    <!-- Strava status footer — shown when Strava connected -->
    <div id="strava-footer" style="display:none;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);align-items:center;gap:7px">
      <i class="ti ti-brand-strava" style="color:var(--strava);font-size:16px"></i>
      <span style="font-size:13px;font-weight:600;color:var(--strava)">Strava kopplad</span>
    </div>

    <!-- Activity feed -->
    <div id="feed-wrap" style="display:none;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07)">
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">Senaste aktivitet</div>
      <div id="feed-list"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
let GEO = null;

function kmOpacity(km) {
  if (!km || km <= 0) return 0.30;
  if (km <= 15)       return 0.50;
  if (km <= 40)       return 0.68;
  if (km <= 80)       return 0.84;
  return 0.95;
}

function playLogSound() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function floatKmUp(km, color) {
  const el = document.createElement('div');
  el.textContent = '+' + km.toFixed(1).replace('.', ',') + ' km';
  el.style.cssText = 'position:fixed;bottom:240px;left:50%;font-size:40px;font-weight:900;letter-spacing:-1px;color:' + color + ';z-index:2000;pointer-events:none;font-family:var(--font);text-shadow:0 0 32px ' + color + '99;animation:floatUp 1.3s ease-out forwards';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function animateCounter(el, from, to, ms) {
  const start = performance.now();
  const diff = to - from;
  (function step(now) {
    const p = Math.min((now - start) / ms, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = (from + diff * eased).toFixed(1).replace('.', ',') + ' km';
    if (p < 1) requestAnimationFrame(step);
  })(start);
}

function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (m < 1)  return 'just nu';
  if (m < 60) return m + ' min sedan';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h sedan';
  return Math.floor(h / 24) + 'd sedan';
}

(async () => {
  const [geoRes, user] = await Promise.all([
    fetch('neighbourhoods.geojson').then(r => r.json()),
    requireAuth(),
  ]);
  if (!user) return;
  GEO = geoRes;

  const profile = await getProfile(user.id);
  if (!profile?.neighbourhood_id) { location.href = 'onboarding.html'; return; }

  const myNhId    = profile.neighbourhood_id;
  const myNhColor = profile.neighbourhoods?.color || '#1D9E75';
  const myNhName  = profile.neighbourhoods?.name  || '–';

  const _c = myNhColor.replace('#','');
  document.body.style.setProperty('--hood-color', myNhColor);
  document.body.style.setProperty('--hood-rgb',
    `${parseInt(_c.slice(0,2),16)},${parseInt(_c.slice(2,4),16)},${parseInt(_c.slice(4,6),16)}`);

  if (profile.strava_connected) sb.functions.invoke('strava-sync').catch(() => {});

  const weekStart = (() => {
    const d = new Date(); const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  const map = L.map('map', {
    zoomControl: false, scrollWheelZoom: true, attributionControl: true,
  }).setView([59.3293, 18.0686], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 16,
  }).addTo(map);

  map.invalidateSize();

  const layerMap = {};
  GEO.features.forEach(f => {
    const nhId  = f.properties.id;
    const nb    = NEIGHBOURHOODS.find(n => n.id === nhId);
    if (!nb) return;
    const isMine = nhId === myNhId;
    const layer = L.geoJSON(f, {
      style: {
        fillColor:    nb.color,
        fillOpacity:  isMine ? 0.22 : 0.10,
        color:        nb.color,
        weight:       isMine ? 3 : 1.5,
        opacity:      isMine ? 1 : 0.65,
      }
    }).addTo(map);

    const layerRef = { layer, nb, isMine, baseFillOpacity: isMine ? 0.22 : 0.10 };
    layerMap[nhId] = layerRef;

    layer.bindPopup('', { maxWidth:190 });
    layer.on('click', () => layer.openPopup());
    layer.on('mouseover', () => layer.setStyle({ fillOpacity: Math.min(layerRef.baseFillOpacity + 0.15, 0.5) }));
    layer.on('mouseout',  () => layer.setStyle({ fillOpacity: layerRef.baseFillOpacity }));
  });

  let pulse = true;
  setInterval(() => {
    pulse = !pulse;
    const mine = layerMap[myNhId];
    if (mine) mine.layer.setStyle({ color: pulse ? myNhColor : 'rgba(255,255,255,0.25)', weight: pulse ? 3.5 : 2 });
  }, 900);

  function flashPolygon() {
    const ref = layerMap[myNhId];
    if (!ref) return;
    const orig = ref.baseFillOpacity;
    ref.layer.setStyle({ fillOpacity: 0.85, weight: 8 });
    setTimeout(() => ref.layer.setStyle({ fillOpacity: 0.4,  weight: 5 }), 150);
    setTimeout(() => ref.layer.setStyle({ fillOpacity: 0.85, weight: 8 }), 300);
    setTimeout(() => ref.layer.setStyle({ fillOpacity: 0.4,  weight: 5 }), 450);
    setTimeout(() => ref.layer.setStyle({ fillOpacity: 0.85, weight: 8 }), 600);
    setTimeout(() => ref.layer.setStyle({ fillOpacity: orig,  weight: ref.isMine ? 3.5 : 1.5 }), 1000);
  }

  let lastMyKm     = null;
  let latestLeading = false;
  let greetingShown = false;

  async function updateData() {
    const [lbRes, myWoRes] = await Promise.all([
      sb.from('weekly_km').select('*'),
      sb.from('workouts').select('km').eq('user_id', user.id).gte('logged_date', weekStart),
    ]);

    const entries   = lbRes.data || [];
    const myKm      = (myWoRes.data || []).reduce((s, w) => s + Number(w.km), 0);
    const myRow     = entries.find(e => e.id === myNhId);
    const myRank    = entries.findIndex(e => e.id === myNhId) + 1;
    const isLeading = myRank === 1 && (myRow?.total_km || 0) > 0;
    latestLeading   = isLeading;

    entries.forEach((e, i) => {
      const ref = layerMap[e.id];
      if (!ref) return;
      ref.baseFillOpacity = ref.isMine
        ? Math.max(0.22, kmOpacity(e.total_km) * 0.4)
        : kmOpacity(e.total_km) * 0.22;
      ref.layer.setStyle({ fillOpacity: ref.baseFillOpacity });
      ref.layer.setPopupContent(`
        <div class="map-popup-name">${ref.nb.name}</div>
        <div class="map-popup-km">${Number(e.total_km).toFixed(1).replace('.',',')} km</div>
        <div class="map-popup-rank">#${i+1} denna vecka</div>
        <div class="map-popup-sub">${e.active_runners} aktiva löpare</div>
      `);
    });

    document.getElementById('stat-grid').innerHTML = `
      <div>
        <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.2">${myNhName}</div>
        <div class="map-stat-label">Din stadsdel</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:48px;font-weight:900;line-height:1;letter-spacing:-3px;color:var(--hood-color)">#${myRank||'–'}</div>
        <div class="map-stat-label">Din rank</div>
      </div>
      <div style="text-align:right">
        <div id="dash-my-km" style="font-size:24px;font-weight:800;color:var(--hood-color);line-height:1.1">${myKm.toFixed(1).replace('.',',')} km</div>
        <div class="map-stat-label">Denna vecka</div>
      </div>
    `;

    if (lastMyKm !== null && myKm !== lastMyKm) {
      const el = document.getElementById('dash-my-km');
      if (el) animateCounter(el, lastMyKm, myKm, 800);
    }
    lastMyKm = myKm;

    const banner  = document.getElementById('attack-banner');
    const myNhKm  = Number(myRow?.total_km || 0);
    let attackMsg = null;
    if (myNhKm > 0) {
      if (isLeading) {
        const rival = entries[1];
        if (rival) {
          const gap = myNhKm - Number(rival.total_km || 0);
          if (gap <= 15) attackMsg = `${rival.name} är bara ${gap.toFixed(1).replace('.',',')} km bakom — spring nu!`;
        }
      } else {
        const leader = entries[0];
        if (leader) {
          const gap = Number(leader.total_km || 0) - myNhKm;
          if (gap <= 15) attackMsg = `Du är ${gap.toFixed(1).replace('.',',')} km från att ta #1 — spring nu!`;
        }
      }
    }
    if (attackMsg) {
      document.getElementById('attack-text').textContent = attackMsg;
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }

    if (profile.strava_connected) {
      document.getElementById('log-widget').style.display = 'none';
      document.getElementById('strava-footer').style.display = 'flex';
    } else {
      document.getElementById('log-widget').style.display = 'block';
      document.getElementById('strava-footer').style.display = 'none';
    }

    document.getElementById('bottom-card').style.display = 'block';
    document.getElementById('loading').classList.add('hidden');
  }

  async function refreshFeed() {
    const { data } = await sb
      .from('workouts')
      .select('km, created_at, profiles(neighbourhoods(name, color))')
      .order('created_at', { ascending: false })
      .limit(5);

    const items = (data || []).filter(w => w.profiles?.neighbourhoods);

    const PLACEHOLDERS = [
      { nhName: 'Södermalm', color: '#378ADD', km: 4.2, ts: new Date(Date.now() - 480000) },
      { nhName: 'Vasastan',  color: '#639922', km: 7.8, ts: new Date(Date.now() - 1920000) },
      { nhName: 'Östermalm', color: '#BA7517', km: 3.1, ts: new Date(Date.now() - 3660000) },
    ];

    const rows = items.length > 0
      ? items.map(w => ({ nhName: w.profiles.neighbourhoods.name, color: w.profiles.neighbourhoods.color, km: Number(w.km), ago: timeAgo(w.created_at) }))
      : PLACEHOLDERS.map(p => ({ ...p, ago: timeAgo(p.ts) }));

    const feedList = document.getElementById('feed-list');
    const feedWrap = document.getElementById('feed-wrap');
    if (!feedList) return;

    feedList.innerHTML = rows.map((r, i) => `
      <div class="feed-row" style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;animation-delay:${i * 0.07}s">
        <div style="width:6px;height:6px;border-radius:50%;background:${r.color};flex-shrink:0;margin-top:4px"></div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5">
          Någon i <span style="color:${r.color};font-weight:700">${r.nhName}</span> loggade ${r.km.toFixed(1).replace('.',',')} km
          <span style="color:rgba(255,255,255,0.28);margin-left:2px">${r.ago}</span>
        </div>
      </div>
    `).join('');

    feedWrap.style.display = 'block';
  }

  await updateData();

  // Personal greeting (shown once on load)
  if (!greetingShown) {
    greetingShown = true;
    const hour = new Date().getHours();
    const firstName = (profile.name || 'du').split(' ')[0];
    let msg;
    if (latestLeading) {
      msg = 'Du leder Stockholm just nu 👑';
    } else if (hour >= 6 && hour < 10) {
      msg = `God morgon ${firstName} — ${myNhName} vaknar 🌅`;
    } else if (lastMyKm > 0) {
      msg = `Bra jobbat idag ${firstName} 💪`;
    } else {
      msg = `${myNhName} behöver dig — spring idag!`;
    }
    const greetEl = document.getElementById('greeting');
    document.getElementById('greeting-text').textContent = msg;
    greetEl.style.opacity = '1';
    setTimeout(() => { greetEl.style.opacity = '0'; }, 4000);
  }

  await refreshFeed();

  document.getElementById('dash-log-btn').addEventListener('click', async () => {
    const kmInput = document.getElementById('dash-km');
    const msgEl   = document.getElementById('dash-log-msg');
    const btn     = document.getElementById('dash-log-btn');
    const km      = parseFloat(kmInput.value);

    msgEl.textContent = '';
    if (!km || km <= 0) {
      msgEl.style.color = '#FCA5A5'; msgEl.textContent = 'Ange hur långt du sprang.'; return;
    }
    if (km > 100) {
      msgEl.style.color = '#FCA5A5'; msgEl.textContent = 'Max 100 km per pass.'; return;
    }

    btn.disabled = true; btn.textContent = '…';

    const { error } = await sb.from('workouts').insert({
      user_id: user.id,
      km: Math.round(km * 100) / 100,
      logged_date: getTodayStr(),
    });

    btn.disabled = false; btn.textContent = 'Logga';

    if (error) {
      msgEl.style.color = '#FCA5A5'; msgEl.textContent = error.message; return;
    }

    msgEl.style.color = '#6EE7B7';
    msgEl.textContent = `+${km.toFixed(1).replace('.',',')} km loggat!`;
    kmInput.value = '';
    playLogSound();
    floatKmUp(km, myNhColor);
    flashPolygon();
    await updateData();
    await refreshFeed();
  });

  sb.channel('dashboard-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'workouts' }, async () => {
      await updateData();
      await refreshFeed();
    })
    .subscribe();

  document.getElementById('logout-pill').addEventListener('click', async () => {
    await sb.auth.signOut(); location.href = 'login.html';
  });
})();
</script>

<button id="logout-pill" style="position:fixed;bottom:16px;left:16px;z-index:1000;display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(153,27,27,0.15);border:0.5px solid rgba(153,27,27,0.4);border-radius:99px;cursor:pointer;font-family:var(--font);font-size:12px;color:#FCA5A5">
  <i class="ti ti-logout" style="font-size:13px"></i> Logga ut
</button>
</body>
</html>
