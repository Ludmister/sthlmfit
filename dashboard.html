<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SthlmFit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { background: #0D1B2A; }
    .screen { background: #0D1B2A; min-height: 100vh; min-height: 100dvh; }

    /* ── Header ─────────────────────────────────────────── */
    .dash-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: calc(18px + env(safe-area-inset-top)) 16px 14px;
    }
    .dash-greeting { font-size: 21px; font-weight: 800; color: #fff; line-height: 1.2; letter-spacing: -0.3px; }
    .nh-pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 4px 11px;
      background: rgba(var(--hood-rgb),0.15);
      border: 1px solid var(--hood-color);
      border-radius: 99px; font-size: 11px; font-weight: 700;
      color: var(--hood-color); letter-spacing: 0.01em;
    }
    .nh-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hood-color); }
    .header-btn {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: var(--font);
    }
    .header-btn .ti { font-size: 19px; }
    .header-btn:active { transform: scale(0.94); }

    /* ── Content scroll area ────────────────────────────── */
    .dash-content {
      padding: 0 16px calc(var(--nav-h) + 24px);
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Card (dark) ────────────────────────────────────── */
    .d-card {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 20px;
    }
    .d-lbl {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Weekly hero ────────────────────────────────────── */
    .hero-num {
      font-size: 48px; font-weight: 900; color: var(--hood-color);
      line-height: 1; letter-spacing: -2px; margin: 8px 0 2px;
    }
    .hero-unit { font-size: 22px; font-weight: 800; color: rgba(255,255,255,0.35); letter-spacing: -1px; }
    .hero-cmp { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); }
    .delta {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.01em;
    }
    .delta .ti { font-size: 13px; }
    .delta.up   { background: rgba(74,222,128,0.12);  color: #4ADE80; }
    .delta.down { background: rgba(248,113,113,0.12); color: #F87171; }
    .delta.flat { background: rgba(255,255,255,0.06);  color: rgba(255,255,255,0.4); }

    /* ── Week bar chart ─────────────────────────────────── */
    .bars { display: flex; align-items: flex-end; gap: 4px; height: 72px; margin-top: 4px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bar {
      width: 100%; border-radius: 5px 5px 2px 2px;
      background: rgba(29,158,117,0.3);
      transition: height 0.4s ease-out;
    }
    .bar.today { background: var(--hood-color); }
    .bar-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); }
    .bar-col.is-today .bar-lbl { color: var(--hood-color); }

    /* ── Segmented time filter ──────────────────────────── */
    .seg {
      display: flex; gap: 2px; padding: 3px;
      background: rgba(255,255,255,0.06); border-radius: 10px;
    }
    .seg-btn {
      flex: 1; padding: 8px 0; border: none; background: none; cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.5); border-radius: 8px; transition: all 0.15s;
    }
    .seg-btn.active { background: var(--navy); border: 1px solid rgba(255,255,255,0.12); color: #fff; }

    /* ── Mini map ───────────────────────────────────────── */
    .mini-map-wrap {
      position: relative; height: 120px; border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
    }
    #mini-map { width: 100%; height: 100%; background: #0D1B2A; }
    .map-rank-pill {
      position: absolute; left: 10px; bottom: 10px; z-index: 500;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 99px;
      background: rgba(10,22,36,0.9); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .map-rank-pill .ti { font-size: 14px; color: var(--gold); }
    .map-expand {
      position: absolute; right: 10px; top: 10px; z-index: 500;
      width: 30px; height: 30px; border-radius: 8px; padding: 0;
      background: rgba(10,22,36,0.9); border: 1px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.85); cursor: pointer; font-family: var(--font);
    }
    .map-expand .ti { font-size: 16px; }
    .map-expand:active { transform: scale(0.92); }
    .leaflet-container { font-family: 'Inter', sans-serif !important; background: #0D1B2A !important; }

    /* ── Fullscreen map overlay ─────────────────────────── */
    #map-overlay {
      position: fixed; inset: 0; z-index: 1000; background: #0D1B2A;
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
    }
    #map-overlay.open { opacity: 1; visibility: visible; }
    #full-map { width: 100%; height: 100%; }
    #map-close {
      position: fixed; top: calc(14px + env(safe-area-inset-top)); right: 14px; z-index: 1001;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(10,22,36,0.92); border: 1px solid rgba(255,255,255,0.14);
      color: #fff; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: var(--font);
    }
    #map-close .ti { font-size: 22px; }
    #map-close:active { transform: scale(0.94); }

    /* ── Strava coming-soon badge ───────────────────────── */
    .strava-soon {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 99px;
      background: rgba(252,76,2,0.12); opacity: 0.5;
      pointer-events: none; user-select: none;
    }
    .strava-soon .ti { font-size: 13px; color: #FC4C02; }
    .strava-soon span { font-size: 11px; font-weight: 600; color: #FC4C02; }

    /* ── Gear ───────────────────────────────────────────── */
    .gear-row { display: flex; align-items: center; gap: 12px; }
    .gear-icon {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      background: rgba(var(--hood-rgb),0.12);
      display: flex; align-items: center; justify-content: center; color: var(--hood-color);
    }
    .gear-icon .ti { font-size: 22px; }
    .gear-name { font-size: 15px; font-weight: 700; color: #fff; }
    .gear-brand { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .gear-km { font-size: 13px; font-weight: 800; color: #fff; text-align: right; white-space: nowrap; }
    .gear-km-max { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.35); }
    .prog-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-top: 12px; }
    .prog-fill { height: 100%; background: var(--green); border-radius: 99px; }
    .prog-fill.warn { background: #F87171; }
    .gear-left { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 7px; }
    .gear-empty { text-align: center; padding: 6px 0 2px; }
    .gear-empty-icon { font-size: 30px; color: rgba(255,255,255,0.2); }
    .gear-empty-txt { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 500; margin: 6px 0 12px; }

    /* ── Log ────────────────────────────────────────────── */
    .log-input {
      width: 100%; box-sizing: border-box; padding: 12px 44px 12px 15px;
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #fff; font-size: 28px; font-weight: 900;
      font-family: var(--font); outline: none; -webkit-appearance: none; appearance: none;
    }
    .log-input:focus { border-color: var(--hood-color); }
    .log-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.35); pointer-events: none; }

    /* ── Activity feed ──────────────────────────────────── */
    .feed-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); opacity: 0; animation: feedIn 0.35s ease forwards; }
    .feed-row:last-child { border-bottom: none; }
    .feed-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .feed-txt { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    @keyframes feedIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-64px); }
    }

    /* ── Bottom nav ─────────────────────────────────────── */
    .bottom-nav { background: #111E2D !important; border-top-color: rgba(255,255,255,0.07) !important; }
    .nav-tab { color: rgba(255,255,255,0.38) !important; }
    .nav-tab.active { color: var(--hood-color) !important; }
    .spinner { border-color: rgba(255,255,255,0.08); border-top-color: var(--hood-color); }

    /* ── Tappable affordance ────────────────────────────── */
    .tappable { cursor: pointer; position: relative; transition: transform 0.1s; }
    .tappable:active { transform: scale(0.99); }
    .tap-chevron { position: absolute; top: 16px; right: 16px; color: rgba(255,255,255,0.25); font-size: 18px; }
    .bar-col { cursor: pointer; }

    /* ── Detail sheet (iOS-style) ───────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      opacity: 0; visibility: hidden; transition: opacity 0.28s ease;
    }
    .sheet-overlay.open { opacity: 1; visibility: visible; }
    .detail-sheet {
      position: absolute; left: 50%; bottom: 0;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: var(--max-w);
      background: var(--navy-mid);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 8px 20px calc(28px + env(safe-area-inset-bottom));
      max-height: 86vh; overflow-y: auto;
      transition: transform 0.34s cubic-bezier(0.32,0.72,0,1);
    }
    .sheet-overlay.open .detail-sheet { transform: translateX(-50%) translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.22); border-radius: 99px; margin: 8px auto 8px; }
    .sheet-close {
      position: absolute; top: 14px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%; padding: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: var(--font);
    }
    .sheet-close .ti { font-size: 18px; }
    .sheet-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; margin: 4px 0 14px; padding-right: 40px; }
    .sheet-hero { font-size: 40px; font-weight: 900; color: var(--hood-color); line-height: 1; letter-spacing: -2px; }
    .sheet-hero .u { font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.35); }
    .sheet-sub { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 500; margin: 4px 0 14px; }
    .sheet-sec-lbl { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; margin: 18px 0 8px; }
    .run-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
    .run-row:last-child { border-bottom: none; }
    .run-ic { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; background: rgba(var(--hood-rgb),0.12); color: var(--hood-color); display: flex; align-items: center; justify-content: center; }
    .run-ic .ti { font-size: 17px; }
    .run-km { font-size: 15px; font-weight: 700; color: #fff; }
    .run-meta { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .sheet-empty { text-align: center; color: rgba(255,255,255,0.4); font-size: 14px; font-weight: 500; padding: 28px 0; }
    .stat-pair { display: flex; gap: 10px; }
    .stat-pill { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 12px 14px; }
    .stat-pill .v { font-size: 17px; font-weight: 800; color: #fff; }
    .stat-pill .l { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 600; margin-top: 2px; }
    .cmp-bars { display: flex; align-items: flex-end; gap: 6px; height: 110px; }
    .cmp-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
    .cmp-bar { width: 100%; border-radius: 5px 5px 2px 2px; background: rgba(29,158,117,0.3); }
    .cmp-bar.cur { background: var(--hood-color); }
    .cmp-val { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.5); }
    .cmp-lbl { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); }

    /* ── Mantra hero ────────────────────────────────────── */
    .mantra-hero { padding: 24px 12px; text-align: center; cursor: pointer; }
    .mantra-quote {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px; font-weight: 500; font-style: italic;
      color: #fff; line-height: 1.4;
    }
    .mantra-hint { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); margin-top: 12px; text-transform: uppercase; letter-spacing: 0.07em; }

    /* ── Stockholm pulse ────────────────────────────────── */
    .sthlm-line { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.7); line-height: 1.5; margin: 8px 0 14px; }
    .sthlm-km { font-size: 30px; font-weight: 900; color: var(--hood-color); letter-spacing: -1px; }
    .sthlm-bar { display: flex; height: 12px; border-radius: 99px; overflow: hidden; background: rgba(255,255,255,0.06); gap: 2px; }
    .seg-piece { height: 100%; min-width: 2px; }
    .seg-piece.leader { animation: sthlmPulse 2s ease-in-out infinite; }
    @keyframes sthlmPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ── Daily tip ──────────────────────────────────────── */
    .tip-text { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.55; margin-top: 8px; font-weight: 500; }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
// ── Date helpers ──────────────────────────────────────────
function ymd(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function mondayOf(d) { const x = new Date(d); const day = x.getDay(); x.setDate(x.getDate() - (day === 0 ? 6 : day - 1)); x.setHours(0,0,0,0); return x; }
function sumKm(list, startStr, endStr) { return list.filter(w => w.logged_date >= startStr && w.logged_date < endStr).reduce((s,w) => s + Number(w.km), 0); }
function countRuns(list, startStr, endStr) { return list.filter(w => w.logged_date >= startStr && w.logged_date < endStr).length; }
function fmt(km) { return Number(km).toFixed(1).replace('.', ','); }

function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (m < 1)  return 'just nu';
  if (m < 60) return m + ' min sedan';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h sedan';
  return Math.floor(h / 24) + 'd sedan';
}

function deltaBadge(cur, prev) {
  if (prev <= 0 && cur <= 0) return { txt: '—', cls: 'flat', icon: 'ti-minus' };
  if (prev <= 0 && cur > 0)  return { txt: 'Nytt!', cls: 'up', icon: 'ti-trending-up' };
  const p = Math.round((cur - prev) / prev * 100);
  if (p > 0) return { txt: '+' + p + '%', cls: 'up',   icon: 'ti-trending-up' };
  if (p < 0) return { txt: p + '%',       cls: 'down', icon: 'ti-trending-down' };
  return { txt: '0%', cls: 'flat', icon: 'ti-minus' };
}

// ── Logging animations (reused) ───────────────────────────
function playLogSound() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}
function floatKmUp(km, color) {
  const el = document.createElement('div');
  el.textContent = '+' + fmt(km) + ' km';
  el.style.cssText = 'position:fixed;bottom:200px;left:50%;font-size:40px;font-weight:900;letter-spacing:-1px;color:' + color + ';z-index:2000;pointer-events:none;font-family:var(--font);text-shadow:0 0 32px ' + color + '99;animation:floatUp 1.3s ease-out forwards';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Rotating motivational quotes (changes daily) ─────────

  'If it does not challenge you, it will not change you.',
  'Mät inte din runda i kilometer, mät den i hur du mår efteråt.',
  'Spring lugnt idag så orkar du springa imorgon också.',

  'Drömmar springs ikapp ett steg i taget.',
  'Sätt målet högt — och spring dit.',

  'Disciplin är att springa även när motivationen sover.',
  'Today I will do what others will not, so tomorrow I can do what others cannot.',
  'Andas in Stockholm, andas ut stress.',
  'Du är starkare än din bekvämaste ursäkt.',
];

// ── Rotating daily tips (changes daily) ──────────────────
const TIPS = [
  'Drick vatten ett par timmar innan du springer för bäst prestation.',
  'Vila är när musklerna växer — överträna inte.',
  'Spring i samma sko hela passet — byt aldrig mid-run.',

  'Sätt ett litet delmål varje vecka — då känns det stora målet nära.',
  'En kall nedvarvning och stretch minskar träningsvärken imorgon.',
];

(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile = await getProfile(user.id);
  if (!profile?.neighbourhood_id) { location.href = 'onboarding.html'; return; }

  const myNhId    = profile.neighbourhood_id;
  const myNhColor = profile.neighbourhoods?.color || '#1D9E75';
  const myNhName  = profile.neighbourhoods?.name  || '–';

  const _c = myNhColor.replace('#','');
  document.body.style.setProperty('--hood-color', myNhColor);
  document.body.style.setProperty('--hood-rgb',
    `${parseInt(_c.slice(0,2),16)},${parseInt(_c.slice(2,4),16)},${parseInt(_c.slice(4,6),16)}`);

  if (profile.strava_connected) sb.functions.invoke('strava-sync').catch(() => {});

  // ── Date anchors ───────────────────────────────────────
  const today = new Date();
  const todayStr = ymd(today);
  const tomorrowStr = ymd(addDays(today, 1));
  const thisMon = mondayOf(today);
  const nextMon = addDays(thisMon, 7);
  const lastMon = addDays(thisMon, -7);
  const Y = today.getFullYear(), M = today.getMonth();

  // ── Fetch everything (gear query tolerates missing table) ──
  const [woRes, lbRes, gearRes, geoRes] = await Promise.all([
    sb.from('workouts').select('km, logged_date, created_at').eq('user_id', user.id),
    sb.from('weekly_km').select('*'),
    sb.from('gear').select('*').eq('user_id', user.id).eq('active', true).order('created_at', { ascending: false }),
    fetch('neighbourhoods.geojson').then(r => r.json()).catch(() => null),
  ]);

  const wo   = woRes.data || [];
  const lb   = lbRes.data || [];
  const gear = gearRes.error ? [] : (gearRes.data || []);

  // ── Period computations ────────────────────────────────
  const weekKm      = sumKm(wo, ymd(thisMon), ymd(nextMon));
  const lastWeekKm  = sumKm(wo, ymd(lastMon), ymd(thisMon));
  const periods = {
    vecka: { label: 'denna vecka', km: weekKm,
             runs: countRuns(wo, ymd(thisMon), ymd(nextMon)) },
    manad: { label: 'denna månad', km: sumKm(wo, ymd(new Date(Y,M,1)), ymd(new Date(Y,M+1,1))),
             runs: countRuns(wo, ymd(new Date(Y,M,1)), ymd(new Date(Y,M+1,1))) },
    ar:    { label: 'i år',        km: sumKm(wo, ymd(new Date(Y,0,1)), ymd(new Date(Y+1,0,1))),
             runs: countRuns(wo, ymd(new Date(Y,0,1)), ymd(new Date(Y+1,0,1))) },
  };

  // ── Daily bars (Mon–Sun current week) ──────────────────
  const dayLbls = ['M','T','O','T','F','L','S'];
  const daily = dayLbls.map((lbl, i) => {
    const d = addDays(thisMon, i);
    return { lbl, km: sumKm(wo, ymd(d), ymd(addDays(d, 1))), isToday: ymd(d) === todayStr };
  });
  const maxDay = Math.max(0.1, ...daily.map(d => d.km));

  // ── Rank ───────────────────────────────────────────────
  const myRank = lb.findIndex(e => e.id === myNhId) + 1;

  // ── Greeting ───────────────────────────────────────────
  const hour = today.getHours();
  const firstName = (profile.name || 'du').split(' ')[0];
  const greeting = hour < 10 ? `God morgon, ${firstName}`
                 : hour < 17 ? `Hej, ${firstName}`
                 : `God kväll, ${firstName}`;

  // ── Weekly delta ───────────────────────────────────────
  const wd = deltaBadge(weekKm, lastWeekKm);

  // ── Gear ───────────────────────────────────────────────
  const g = gear[0];
  let gearHtml;
  if (g) {
    const used   = sumKm(wo, g.purchase_date, tomorrowStr);
    const maxKm  = Number(g.max_km || 800);
    const pctRaw = maxKm > 0 ? used / maxKm : 0;
    const pct    = Math.min(100, Math.round(pctRaw * 100));
    const warn   = pctRaw > 0.85;
    const left   = Math.max(0, maxKm - used);
    gearHtml = `
      <div class="gear-row tappable" id="gear-row">
        <div class="gear-icon"><i class="ti ti-shoe"></i></div>
        <div style="flex:1;min-width:0">
          <div class="gear-name">${g.name}</div>
          <div class="gear-brand">${g.brand || 'Löparskor'}</div>
        </div>
        <div style="text-align:right">
          <div class="gear-km">${fmt(used)} km</div>
          <div class="gear-km-max">av ${maxKm} km</div>
        </div>
        <i class="ti ti-chevron-right" style="color:rgba(255,255,255,0.25);font-size:18px;flex-shrink:0"></i>
      </div>
      <div class="prog-track"><div class="prog-fill${warn ? ' warn' : ''}" style="width:${pct}%"></div></div>
      <div class="gear-left">${warn ? 'Dags att byta skor snart' : `${fmt(left)} km kvar`}</div>`;
  } else {
    gearHtml = `
      <div class="gear-empty">
        <div class="gear-empty-icon"><i class="ti ti-shoe"></i></div>
        <div class="gear-empty-txt">Inga skor tillagda än</div>
        <a href="profile.html#skor" class="btn btn-primary btn-sm" style="text-decoration:none;display:inline-flex">
          <i class="ti ti-plus"></i> Lägg till skor
        </a>
      </div>`;
  }

  // ── Motivational content (rotates daily by day-of-year) ─
  const dayOfYear = Math.floor((today - new Date(Y, 0, 0)) / 86400000);
  const mantra = (profile.mantra || '').trim();
  const quoteText  = mantra || QUOTES[dayOfYear % QUOTES.length];
  const mantraHint = mantra ? 'Tryck för att ändra ditt mantra' : 'Tryck för att skriva ditt eget mantra';
  const dailyTip   = TIPS[dayOfYear % TIPS.length];

  // ── Stockholm pulse ────────────────────────────────────
  const sthlmTotal = lb.reduce((s, e) => s + Number(e.total_km || 0), 0);
  const leaderId   = (lb.length && Number(lb[0].total_km || 0) > 0) ? lb[0].id : null;
  const sthlmSegs  = sthlmTotal > 0 ? lb.map(e => {
    const w = Number(e.total_km || 0) / sthlmTotal * 100;
    if (w <= 0) return '';
    const color = e.color || (NEIGHBOURHOODS.find(n => n.id === e.id)?.color) || '#888780';
    return `<div class="seg-piece${e.id === leaderId ? ' leader' : ''}" style="width:${w}%;background:${color}"></div>`;
  }).join('') : '';

  // ── Render ─────────────────────────────────────────────
  document.getElementById('content').innerHTML = `
    <div class="dash-header">
      <div>
        <div class="dash-greeting">${greeting}</div>
        <div class="nh-pill"><span class="nh-pill-dot"></span>${myNhName}</div>
      </div>
      <button class="header-btn" onclick="location.href='profile.html'" aria-label="Inställningar">
        <i class="ti ti-settings"></i>
      </button>
    </div>

    <div class="dash-content">

      <!-- Mantra / daily quote -->
      <div class="mantra-hero" id="mantra-hero">
        <div class="mantra-quote">“${esc(quoteText)}”</div>
        <div class="mantra-hint">${mantraHint}</div>
      </div>

      <!-- Weekly stats hero -->
      <div class="d-card tappable" id="week-card">
        <i class="ti ti-chevron-right tap-chevron"></i>
        <div class="d-lbl">Denna vecka</div>
        <div class="hero-num">${fmt(weekKm)} <span class="hero-unit">km</span></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
          <div class="hero-cmp">Förra veckan: ${fmt(lastWeekKm)} km</div>
          <div class="delta ${wd.cls}"><i class="ti ${wd.icon}"></i>${wd.txt}</div>
        </div>
      </div>

      <!-- Week bar chart -->
      <div class="d-card">
        <div class="d-lbl" style="margin-bottom:10px">Veckans pass</div>
        <div class="bars">
          ${daily.map(d => {
            const h = d.km > 0 ? Math.round(8 + (d.km / maxDay) * 56) : 4;
            return `<div class="bar-col${d.isToday ? ' is-today' : ''}">
              <div class="bar${d.isToday ? ' today' : ''}" style="height:${h}px"></div>
              <div class="bar-lbl">${d.lbl}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Time filter / total view -->
      <div class="d-card" id="period-card">
        <div class="seg" id="seg">
          <button class="seg-btn active" data-p="vecka">Vecka</button>
          <button class="seg-btn" data-p="manad">Månad</button>
          <button class="seg-btn" data-p="ar">År</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;cursor:pointer">
          <div>
            <div class="hero-num" id="period-km" style="font-size:34px;margin:0">${fmt(periods.vecka.km)} <span class="hero-unit" style="font-size:16px">km</span></div>
            <div class="d-lbl" id="period-lbl" style="margin-top:4px">${periods.vecka.label}</div>
          </div>
          <div style="display:flex;align-items:center;gap:14px">
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:800;color:#fff" id="period-runs">${periods.vecka.runs}</div>
              <div class="d-lbl" style="margin-top:2px">pass</div>
            </div>
            <i class="ti ti-chevron-right" style="color:rgba(255,255,255,0.25);font-size:18px"></i>
          </div>
        </div>
      </div>

      <!-- Stockholm pulse -->
      <div class="d-card tappable" id="sthlm-pulse" onclick="location.href='leaderboard.html'">
        <div class="d-lbl">Stockholm denna vecka</div>
        <div class="sthlm-line">Stockholm har sprungit <span class="sthlm-km" id="sthlm-km">0,0</span> km denna vecka</div>
        <div class="sthlm-bar">${sthlmSegs || '<div style="flex:1"></div>'}</div>
      </div>

      <!-- Mini map widget -->
      <div class="mini-map-wrap" onclick="location.href='leaderboard.html'">
        <div id="mini-map"></div>
        <div class="map-rank-pill"><i class="ti ti-trophy"></i>#${myRank || '–'} ${myNhName}</div>
        <button class="map-expand" id="map-expand" aria-label="Förstora karta"><i class="ti ti-arrows-maximize"></i></button>
      </div>

      <!-- Gear tracker -->
      <div class="d-card">
        <div class="d-lbl" style="margin-bottom:12px">Dina skor</div>
        ${gearHtml}
      </div>

      <!-- Manual log (primary CTA, always visible) -->
      <div class="d-card">
        <div class="d-lbl" style="margin-bottom:10px">Logga löppass</div>
        <div style="display:flex;gap:8px;align-items:stretch">
          <div style="position:relative;flex:1">
            <input type="number" id="dash-km" min="0.1" max="100" step="0.1" inputmode="decimal" placeholder="0" class="log-input" />
            <span class="log-unit">km</span>
          </div>
          <button id="dash-log-btn" class="btn btn-primary" style="width:auto;flex-shrink:0;padding:0 22px">Logga</button>
        </div>
        <div id="dash-log-msg" style="margin-top:8px;font-size:12px;min-height:16px"></div>
      </div>

      <!-- Strava coming-soon badge -->
      <div style="display:flex;justify-content:flex-end">
        <div class="strava-soon"><i class="ti ti-brand-strava"></i><span>Strava — coming soon 🚀</span></div>
      </div>

      <!-- Daily tip -->
      <div class="d-card">
        <div class="d-lbl" style="display:flex;align-items:center;gap:6px"><i class="ti ti-bulb" style="color:var(--hood-color);font-size:14px"></i> Dagens tips</div>
        <div class="tip-text">${dailyTip}</div>
      </div>

      <!-- Activity feed (hidden until there are real workouts) -->
      <div id="feed-section" style="display:none">
        <div class="d-lbl" style="margin:0 4px 8px">Senaste aktivitet</div>
        <div class="d-card" style="padding:6px 16px">
          <div id="feed-list"></div>
        </div>
      </div>

    </div>
  `;

  // ── Mantra tap → edit ──────────────────────────────────
  document.getElementById('mantra-hero').addEventListener('click', () => { location.href = 'profile.html#mantra'; });

  // ── Stockholm count-up ─────────────────────────────────
  const skmEl = document.getElementById('sthlm-km');
  if (skmEl) {
    const start = performance.now();
    (function step(now) {
      const p = Math.min((now - start) / 1100, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      skmEl.textContent = fmt(sthlmTotal * eased);
      if (p < 1) requestAnimationFrame(step);
    })(performance.now());
  }

  // ── Time filter behaviour ──────────────────────────────
  let curPeriod = 'vecka';
  document.getElementById('seg').addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    curPeriod = btn.dataset.p;
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    const p = periods[curPeriod];
    document.getElementById('period-km').innerHTML = `${fmt(p.km)} <span class="hero-unit" style="font-size:16px">km</span>`;
    document.getElementById('period-lbl').textContent = p.label;
    document.getElementById('period-runs').textContent = p.runs;
  });

  // ── Mini map ───────────────────────────────────────────
  if (geoRes) {
    const miniMap = L.map('mini-map', {
      zoomControl: false, attributionControl: false, dragging: false,
      scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false,
      keyboard: false, tap: false, touchZoom: false,
    }).setView([59.3293, 18.0686], 10);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 16 }).addTo(miniMap);

    const group = L.featureGroup();
    geoRes.features.forEach(f => {
      const nb = NEIGHBOURHOODS.find(n => n.id === f.properties.id);
      if (!nb) return;
      const isMine = f.properties.id === myNhId;
      L.geoJSON(f, { style: {
        fillColor: nb.color, fillOpacity: isMine ? 0.45 : 0.10,
        color: nb.color, weight: isMine ? 2.5 : 1, opacity: isMine ? 1 : 0.5,
      }}).addTo(group);
    });
    group.addTo(miniMap);
    try { miniMap.fitBounds(group.getBounds(), { padding: [10, 10] }); } catch(e) {}
    setTimeout(() => miniMap.invalidateSize(), 120);
  }

  // ── Fullscreen interactive map ─────────────────────────
  const overlay = document.getElementById('map-overlay');
  let fullMap = null;
  function buildFullMap() {
    fullMap = L.map('full-map', { zoomControl: true, attributionControl: true })
      .setView([59.3293, 18.0686], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 16, attribution: '&copy; OpenStreetMap &copy; CartoDB',
    }).addTo(fullMap);

    const fg = L.featureGroup();
    if (geoRes) geoRes.features.forEach(f => {
      const nb = NEIGHBOURHOODS.find(n => n.id === f.properties.id);
      if (!nb) return;
      const isMine = f.properties.id === myNhId;
      const row    = lb.find(e => e.id === f.properties.id);
      const rank   = lb.findIndex(e => e.id === f.properties.id) + 1;
      const layer = L.geoJSON(f, { style: {
        fillColor: nb.color, fillOpacity: isMine ? 0.4 : 0.12,
        color: nb.color, weight: isMine ? 3 : 1.5, opacity: isMine ? 1 : 0.6,
      }}).addTo(fg);
      layer.bindPopup(
        `<div class="map-popup-name">${nb.name}</div>` +
        `<div class="map-popup-km">${fmt(row?.total_km || 0)} km</div>` +
        `<div class="map-popup-rank">#${rank || '–'} denna vecka</div>`,
        { maxWidth: 190 });
    });
    fg.addTo(fullMap);
    try { fullMap.fitBounds(fg.getBounds(), { padding: [24, 24] }); } catch(e) {}
  }

  const expandBtn = document.getElementById('map-expand');
  if (expandBtn) expandBtn.addEventListener('click', e => {
    e.stopPropagation();            // don't trigger the widget → leaderboard nav
    overlay.classList.add('open');
    if (!fullMap) buildFullMap();
    setTimeout(() => fullMap.invalidateSize(), 320);
  });
  document.getElementById('map-close').addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  // ── Detail sheets ──────────────────────────────────────
  const MONTHS       = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
  const MONTHS_SHORT = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const WEEKDAYS     = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const hhmm = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
  const dateShort = str => { const d = new Date(str + 'T00:00:00'); return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`; };

  const sheetOverlay = document.getElementById('sheet-overlay');
  const sheetEl      = sheetOverlay.querySelector('.detail-sheet');
  const sheetTitleEl = document.getElementById('sheet-title');
  const sheetBodyEl  = document.getElementById('sheet-body');

  function openSheet(title, html) {
    sheetTitleEl.textContent = title;
    sheetBodyEl.innerHTML = html;
    sheetEl.scrollTop = 0;
    sheetOverlay.classList.add('open');
  }
  function closeSheet() { sheetOverlay.classList.remove('open'); }

  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  sheetOverlay.addEventListener('click', e => { if (e.target === sheetOverlay) closeSheet(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && sheetOverlay.classList.contains('open')) closeSheet(); });

  // swipe-down on handle to dismiss
  const sHandle = document.getElementById('sheet-handle');
  let sy = null;
  sHandle.addEventListener('touchstart', e => { sy = e.touches[0].clientY; sheetEl.style.transition = 'none'; }, { passive: true });
  sHandle.addEventListener('touchmove',  e => { if (sy == null) return; const dy = Math.max(0, e.touches[0].clientY - sy); sheetEl.style.transform = `translateX(-50%) translateY(${dy}px)`; }, { passive: true });
  sHandle.addEventListener('touchend',   e => { if (sy == null) return; const dy = e.changedTouches[0].clientY - sy; sheetEl.style.transition = ''; sheetEl.style.transform = ''; if (dy > 80) closeSheet(); sy = null; }, { passive: true });

  function runsBetween(startStr, endStr) {
    return wo.filter(w => w.logged_date >= startStr && w.logged_date < endStr)
             .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }
  function runRow(w, showDate) {
    const d = new Date(w.logged_date + 'T00:00:00');
    const datePart = showDate ? `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} · ` : '';
    return `<div class="run-row">
      <div class="run-ic"><i class="ti ti-run"></i></div>
      <div style="flex:1">
        <div class="run-km">${fmt(Number(w.km))} km</div>
        <div class="run-meta">${datePart}kl ${hhmm(w.created_at)}</div>
      </div>
    </div>`;
  }
  const statPill = (v, l) => `<div class="stat-pill"><div class="v">${v}</div><div class="l">${l}</div></div>`;

  // 1) Single day
  function openDay(i) {
    const d = addDays(thisMon, i);
    const ds = ymd(d);
    const runs = runsBetween(ds, ymd(addDays(d, 1)));
    const total = runs.reduce((s, w) => s + Number(w.km), 0);
    const title = `${cap(WEEKDAYS[d.getDay()])} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
    let body;
    if (!runs.length) {
      body = `<div class="sheet-empty">Inga pass denna dag</div>`;
    } else {
      body = `<div class="sheet-hero">${fmt(total)} <span class="u">km</span></div>
        <div class="sheet-sub">${runs.length} pass</div>
        <div class="sheet-sec-lbl">Pass</div>${runs.map(w => runRow(w, false)).join('')}`;
    }
    openSheet(title, body);
  }

  // 2) Week with 5-week comparison
  function openWeek() {
    const runs = runsBetween(ymd(thisMon), ymd(nextMon));
    const total = runs.reduce((s, w) => s + Number(w.km), 0);
    const avg = runs.length ? total / runs.length : 0;
    const cols = [];
    for (let k = 4; k >= 0; k--) {
      const ws = addDays(thisMon, -7 * k);
      cols.push({ km: sumKm(wo, ymd(ws), ymd(addDays(ws, 7))), lbl: `${ws.getDate()}/${ws.getMonth()+1}`, cur: k === 0 });
    }
    const maxc = Math.max(0.1, ...cols.map(c => c.km));
    const chart = `<div class="sheet-sec-lbl">Senaste 5 veckorna</div>
      <div class="cmp-bars">${cols.map(c => {
        const h = c.km > 0 ? Math.round(12 + (c.km / maxc) * 80) : 4;
        return `<div class="cmp-col"><div class="cmp-val">${c.km > 0 ? fmt(c.km) : ''}</div><div class="cmp-bar${c.cur ? ' cur' : ''}" style="height:${h}px"></div><div class="cmp-lbl">${c.lbl}</div></div>`;
      }).join('')}</div>`;
    const stats = `<div class="stat-pair" style="margin-top:6px">${statPill(runs.length, 'pass denna vecka')}${statPill(fmt(avg) + ' km', 'snitt per pass')}</div>`;
    const list = `<div class="sheet-sec-lbl">Alla pass</div>` + (runs.length ? runs.map(w => runRow(w, true)).join('') : `<div class="sheet-empty">Inga pass denna vecka</div>`);
    openSheet('Denna vecka', `<div class="sheet-hero">${fmt(total)} <span class="u">km</span></div><div class="sheet-sub">denna vecka</div>${stats}${chart}${list}`);
  }

  // 3a) Month
  function openMonth() {
    const s = ymd(new Date(Y, M, 1)), e = ymd(new Date(Y, M + 1, 1));
    const runs = runsBetween(s, e);
    const total = runs.reduce((a, w) => a + Number(w.km), 0);
    const avg = runs.length ? total / runs.length : 0;
    const stats = `<div class="stat-pair" style="margin-top:6px">${statPill(runs.length, 'pass')}${statPill(fmt(avg) + ' km', 'snitt per pass')}</div>`;
    const list = `<div class="sheet-sec-lbl">Alla pass</div>` + (runs.length ? runs.map(w => runRow(w, true)).join('') : `<div class="sheet-empty">Inga pass denna månad</div>`);
    openSheet(cap(MONTHS[M]), `<div class="sheet-hero">${fmt(total)} <span class="u">km</span></div><div class="sheet-sub">${MONTHS[M]} ${Y}</div>${stats}${list}`);
  }

  // 3b) Year with month-by-month chart
  function openYear() {
    const months = [];
    for (let mo = 0; mo < 12; mo++) months.push(sumKm(wo, ymd(new Date(Y, mo, 1)), ymd(new Date(Y, mo + 1, 1))));
    const total = months.reduce((a, b) => a + b, 0);
    const runsCount = countRuns(wo, ymd(new Date(Y, 0, 1)), ymd(new Date(Y + 1, 0, 1)));
    const maxm = Math.max(0.1, ...months);
    const chart = `<div class="sheet-sec-lbl">Månad för månad</div>
      <div class="cmp-bars" style="height:120px">${months.map((km, idx) => {
        const h = km > 0 ? Math.round(8 + (km / maxm) * 92) : 3;
        return `<div class="cmp-col"><div class="cmp-bar${idx === M ? ' cur' : ''}" style="height:${h}px"></div><div class="cmp-lbl">${MONTHS_SHORT[idx][0].toUpperCase()}</div></div>`;
      }).join('')}</div>`;
    const stats = `<div class="stat-pair" style="margin-top:6px">${statPill(runsCount, 'pass i år')}${statPill(fmt(total / 12) + ' km', 'snitt per månad')}</div>`;
    openSheet(`${Y}`, `<div class="sheet-hero">${fmt(total)} <span class="u">km</span></div><div class="sheet-sub">totalt i år</div>${stats}${chart}`);
  }

  // 4) Gear / shoe
  function openGearDetail(item) {
    const runs = runsBetween(item.purchase_date, tomorrowStr);
    const used = runs.reduce((a, w) => a + Number(w.km), 0);
    const maxKm = Number(item.max_km || 800);
    const ratio = maxKm > 0 ? used / maxKm : 0;
    const pct = Math.min(100, Math.round(ratio * 100));
    const warn = ratio > 0.85;
    const pd = new Date(item.purchase_date + 'T00:00:00');
    const last = runs.length ? dateShort(runs[0].logged_date) : '–';
    const head = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div class="gear-icon"><i class="ti ti-shoe"></i></div>
        <div><div class="gear-name">${item.name}</div><div class="gear-brand">${item.brand || 'Löparskor'}</div></div>
      </div>`;
    const stats = `<div class="stat-pair" style="margin-top:6px">${statPill(fmt(used) + ' km', 'total sträcka')}${statPill(maxKm + ' km', 'livslängd')}</div>
      <div class="stat-pair" style="margin-top:10px">${statPill(`${pd.getDate()} ${MONTHS_SHORT[pd.getMonth()]} ${pd.getFullYear()}`, 'inköpsdatum')}${statPill(last, 'senast använd')}</div>`;
    const bar = `<div class="prog-track" style="margin-top:16px"><div class="prog-fill${warn ? ' warn' : ''}" style="width:${pct}%"></div></div>
      <div class="gear-left">${warn ? 'Dags att byta skor snart' : `${fmt(Math.max(0, maxKm - used))} km kvar`}</div>`;
    const list = `<div class="sheet-sec-lbl">Pass i dessa skor</div>` + (runs.length ? runs.map(w => runRow(w, true)).join('') : `<div class="sheet-empty">Inga pass än</div>`);
    openSheet(item.name, `${head}${stats}${bar}${list}`);
  }

  // ── Wire taps ──────────────────────────────────────────
  document.querySelectorAll('.bar-col').forEach((col, i) => col.addEventListener('click', () => openDay(i)));
  document.getElementById('week-card').addEventListener('click', openWeek);
  document.getElementById('period-card').addEventListener('click', e => {
    if (e.target.closest('#seg')) return;   // toggle taps switch period, not open
    if (curPeriod === 'manad') openMonth();
    else if (curPeriod === 'ar') openYear();
    else openWeek();
  });
  const gearRowEl = document.getElementById('gear-row');
  if (gearRowEl && g) gearRowEl.addEventListener('click', () => openGearDetail(g));

  // ── Activity feed ──────────────────────────────────────
  async function refreshFeed() {
    const { data } = await sb
      .from('workouts')
      .select('km, created_at, profiles(neighbourhoods(name, color))')
      .order('created_at', { ascending: false })
      .limit(6);

    const items = (data || []).filter(w => w.profiles?.neighbourhoods);
    const section  = document.getElementById('feed-section');
    const feedList = document.getElementById('feed-list');
    if (!feedList || !section) return;

    if (items.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    feedList.innerHTML = items.map((w, i) => {
      const nh = w.profiles.neighbourhoods;
      return `
      <div class="feed-row" style="animation-delay:${i * 0.06}s">
        <div class="feed-dot" style="background:${nh.color}"></div>
        <div class="feed-txt">
          Någon i <span style="color:${nh.color};font-weight:700">${nh.name}</span> loggade ${fmt(Number(w.km))} km
          <span style="color:rgba(255,255,255,0.3);margin-left:2px">${timeAgo(w.created_at)}</span>
        </div>
      </div>`;
    }).join('');
  }
  await refreshFeed();

  // ── Manual logging ─────────────────────────────────────
  document.getElementById('dash-log-btn').addEventListener('click', async () => {
    const kmInput = document.getElementById('dash-km');
    const msgEl   = document.getElementById('dash-log-msg');
    const btn     = document.getElementById('dash-log-btn');
    const km      = parseFloat(kmInput.value);

    msgEl.textContent = '';
    if (!km || km <= 0) { msgEl.style.color = '#FCA5A5'; msgEl.textContent = 'Ange hur långt du sprang.'; return; }
    if (km > 100)       { msgEl.style.color = '#FCA5A5'; msgEl.textContent = 'Max 100 km per pass.'; return; }

    btn.disabled = true; btn.textContent = '…';
    const { error } = await sb.from('workouts').insert({
      user_id: user.id, km: Math.round(km * 100) / 100, logged_date: todayStr,
    });
    btn.disabled = false; btn.textContent = 'Logga';

    if (error) { msgEl.style.color = '#FCA5A5'; msgEl.textContent = error.message; return; }

    msgEl.style.color = '#6EE7B7';
    msgEl.textContent = `+${fmt(km)} km loggat!`;
    kmInput.value = '';
    playLogSound();
    floatKmUp(km, myNhColor);
    setTimeout(() => location.reload(), 900);
  });

  // ── Realtime: refresh feed on new workouts ─────────────
  sb.channel('dashboard-live')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'workouts' }, refreshFeed)
    .subscribe();
})();
</script>
</body>
