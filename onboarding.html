<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Kom igång</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0D1B2A; }
    .ob-screen {
      min-height: 100vh;
      min-height: 100dvh;
      background: #0D1B2A;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .ob-logo {
      padding: 52px 0 28px;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
      font-family: var(--font);
      flex-shrink: 0;
    }
    .ob-logo span { color: var(--green); }
    .ob-headline {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .ob-nh-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }
    .ob-nh-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      text-align: left;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .ob-nh-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ob-btn-continue {
      width: 100%;
      padding: 16px 20px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .ob-btn-continue.ready {
      opacity: 1;
      pointer-events: auto;
    }
    .ob-btn-strava {
      width: 100%;
      padding: 16px 20px;
      background: #FC4C02;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .ob-skip {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

<!-- Screen 1: Neighbourhood picker -->
<div class="ob-screen" id="screen1">
  <div class="ob-logo">Sthlm<span>Fit</span></div>
  <div class="ob-headline">Välj din stadsdel</div>
  <div class="ob-nh-grid" id="nh-grid"></div>
  <div style="flex:1"></div>
  <div style="width:100%;max-width:420px;padding-bottom:32px;flex-shrink:0">
    <button class="ob-btn-continue" id="fortsatt-btn">
      Fortsätt <i class="ti ti-arrow-right" style="font-size:16px"></i>
    </button>
  </div>
</div>

<!-- Screen 2: Strava connect -->
<div class="ob-screen" id="screen2" style="display:none">
  <div class="ob-logo">Sthlm<span>Fit</span></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:420px;text-align:center">
    <i class="ti ti-brand-strava" style="font-size:72px;color:#FC4C02;margin-bottom:12px"></i>
    <div style="font-size:24px;font-weight:800;color:#fff;margin-bottom:12px">Koppla Strava</div>
    <div style="font-size:15px;color:rgba(255,255,255,0.5);line-height:1.6;max-width:280px">
      Dina löpningar synkas automatiskt — du behöver aldrig logga manuellt
    </div>
  </div>
  <div style="width:100%;max-width:420px;padding-bottom:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center">
    <a id="strava-btn" href="#" class="ob-btn-strava">
      <i class="ti ti-brand-strava" style="font-size:18px"></i> Koppla med Strava
    </a>
    <button class="ob-skip" id="skip-btn">Hoppa över — logga manuellt</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;

  const profile = await getProfile(user.id);
  if (profile?.neighbourhood_id) { location.href = 'dashboard.html'; return; }

  let selectedNh = null;
  const grid = document.getElementById('nh-grid');
  const continueBtn = document.getElementById('fortsatt-btn');

  NEIGHBOURHOODS.forEach(nh => {
    const card = document.createElement('button');
    card.className = 'ob-nh-card';
    card.innerHTML = `<div class="ob-nh-dot" style="background:${nh.color}"></div><span>${nh.name}</span>`;
    card.addEventListener('click', () => {
      selectedNh = nh.id;
      grid.querySelectorAll('.ob-nh-card').forEach(c => {
        c.style.background = 'rgba(255,255,255,0.05)';
        c.style.borderColor = 'rgba(255,255,255,0.08)';
        c.style.color = 'rgba(255,255,255,0.65)';
      });
      card.style.background = nh.color + '26';
      card.style.borderColor = nh.color;
      card.style.color = '#fff';
      continueBtn.classList.add('ready');
    });
    grid.appendChild(card);
  });

  continueBtn.addEventListener('click', async () => {
    if (!selectedNh) return;
    continueBtn.disabled = true;
    continueBtn.innerHTML = '<i class="ti ti-loader-2 spin-icon"></i> Sparar…';

    const { error } = await sb.from('profiles')
      .update({ neighbourhood_id: selectedNh })
      .eq('id', user.id);

    if (error) {
      continueBtn.disabled = false;
      continueBtn.innerHTML = 'Fortsätt <i class="ti ti-arrow-right" style="font-size:16px"></i>';
      alert(error.message);
      return;
    }

    document.getElementById('screen1').style.display = 'none';
    document.getElementById('screen2').style.display = 'flex';
    document.getElementById('strava-btn').href = STRAVA_AUTH_URL;
  });

  document.getElementById('skip-btn').addEventListener('click', () => {
    location.href = 'dashboard.html';
  });
})();
</script>
</body>
</html>
