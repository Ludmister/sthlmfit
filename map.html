<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Karta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 440px; }
    .leaflet-container { font-family: var(--font); }
    .map-popup { font-family: var(--font); min-width: 140px; }
    .map-popup-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
    .map-popup-pts  { font-size: 13px; color: var(--green); font-weight: 700; }
    .map-popup-rank { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .map-popup-btn  {
      display: block; margin-top: 8px; background: var(--green); color: #fff;
      border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700;
      cursor: pointer; width: 100%; font-family: var(--font); text-align: center;
    }
  </style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="topbar-inner">
      <button class="topbar-back" onclick="location.href='leaderboard.html'">
        <i class="ti ti-arrow-left"></i> Tillbaka
      </button>
      <div class="topbar-title">Kartvy</div>
      <div style="width:80px"></div>
    </div>
  </div>

  <div class="page-content" style="padding-top:12px">

    <div id="map"></div>

    <div class="card-label" style="margin-bottom:6px">FÄRGSKALA – VECKOPOÄNG</div>
    <div class="map-legend" id="legend">
      <div class="map-legend-item">
        <div class="map-legend-swatch" style="background:#1a9850"></div>
        Högt (500+)
      </div>
      <div class="map-legend-item">
        <div class="map-legend-swatch" style="background:#91cf60"></div>
        Medel (200–499)
      </div>
      <div class="map-legend-item">
        <div class="map-legend-swatch" style="background:#fee08b"></div>
        Lågt (1–199)
      </div>
      <div class="map-legend-item">
        <div class="map-legend-swatch" style="background:#d3d3d3"></div>
        Ingen aktivitet
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='index.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <a class="nav-tab-log" href="log.html">
      <span class="icon"><i class="ti ti-plus"></i></span>Logga
    </a>
    <button class="nav-tab active" onclick="location.href='leaderboard.html'">
      <i class="ti ti-trophy"></i>Tävling
    </button>
    <button class="nav-tab" onclick="location.href='friends.html'">
      <i class="ti ti-users"></i>Vänner
    </button>
    <button class="nav-tab" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
// Approximate GeoJSON polygons for Stockholm neighbourhoods
const STOCKHOLM_GEO = {
  type: "FeatureCollection",
  features: [
    { type:"Feature", properties:{id:1}, geometry:{type:"Polygon", coordinates:[[[18.020,59.303],[18.108,59.303],[18.108,59.334],[18.060,59.340],[18.020,59.333],[18.020,59.303]]]} },
    { type:"Feature", properties:{id:2}, geometry:{type:"Polygon", coordinates:[[[17.995,59.338],[18.063,59.338],[18.063,59.368],[17.995,59.368],[17.995,59.338]]]} },
    { type:"Feature", properties:{id:3}, geometry:{type:"Polygon", coordinates:[[[18.055,59.328],[18.140,59.328],[18.140,59.372],[18.055,59.372],[18.055,59.328]]]} },
    { type:"Feature", properties:{id:4}, geometry:{type:"Polygon", coordinates:[[[17.978,59.323],[18.048,59.323],[18.048,59.349],[17.978,59.349],[17.978,59.323]]]} },
    { type:"Feature", properties:{id:5}, geometry:{type:"Polygon", coordinates:[[[18.060,59.317],[18.083,59.317],[18.083,59.330],[18.060,59.330],[18.060,59.317]]]} },
    { type:"Feature", properties:{id:6}, geometry:{type:"Polygon", coordinates:[[[18.037,59.328],[18.078,59.328],[18.078,59.347],[18.037,59.347],[18.037,59.328]]]} },
    { type:"Feature", properties:{id:7}, geometry:{type:"Polygon", coordinates:[[[18.072,59.292],[18.118,59.292],[18.118,59.320],[18.072,59.320],[18.072,59.292]]]} },
    { type:"Feature", properties:{id:8}, geometry:{type:"Polygon", coordinates:[[[17.982,59.302],[18.040,59.302],[18.040,59.330],[17.982,59.330],[17.982,59.302]]]} },
    { type:"Feature", properties:{id:9}, geometry:{type:"Polygon", coordinates:[[[18.110,59.342],[18.218,59.342],[18.218,59.402],[18.110,59.402],[18.110,59.342]]]} },
    { type:"Feature", properties:{id:10}, geometry:{type:"Polygon", coordinates:[[[18.085,59.323],[18.172,59.323],[18.172,59.362],[18.085,59.362],[18.085,59.323]]]} },
  ]
};

function ptsToColor(pts) {
  if (!pts || pts === 0) return '#d3d3d3';
  if (pts >= 500) return '#1a9850';
  if (pts >= 200) return '#91cf60';
  return '#fee08b';
}

(async () => {
  await requireAuth();

  const { data: lb } = await sb.from('neighbourhood_leaderboard').select('*');
  const sorted = (lb || []).sort((a, b) => (b.weekly_points||0) - (a.weekly_points||0));
  const ptsMap = Object.fromEntries((lb || []).map(e => [e.id, e.weekly_points || 0]));
  const rankMap = Object.fromEntries(sorted.map((e, i) => [e.id, i + 1]));

  const map = L.map('map', { zoomControl: true, scrollWheelZoom: false })
    .setView([59.332, 18.065], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap, &copy; CartoDB',
    maxZoom: 16,
  }).addTo(map);

  STOCKHOLM_GEO.features.forEach(feature => {
    const nhId    = feature.properties.id;
    const nb      = NEIGHBOURHOODS.find(n => n.id === nhId);
    if (!nb) return;
    const pts     = ptsMap[nhId] || 0;
    const rank    = rankMap[nhId] || '–';
    const color   = ptsToColor(pts);
    const isLeader = rank === 1 && pts > 0;

    const layer = L.geoJSON(feature, {
      style: {
        fillColor: color,
        fillOpacity: 0.72,
        color: isLeader ? '#D97706' : '#fff',
        weight: isLeader ? 2.5 : 1.2,
        dashArray: null,
      }
    }).addTo(map);

    const popupHtml = `
      <div class="map-popup">
        <div class="map-popup-name">${isLeader ? '👑 ' : ''}${nb.name}</div>
        <div class="map-popup-pts">${pts.toLocaleString('sv-SE')} pts denna vecka</div>
        <div class="map-popup-rank">Rank #${rank}</div>
        <button class="map-popup-btn"
          onclick="location.href='neighbourhood.html?id=${nhId}&name=${encodeURIComponent(nb.name)}'">
          Öppna stadsdel
        </button>
      </div>`;
    layer.bindPopup(popupHtml, { maxWidth: 200 });
    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.9 }));
    layer.on('mouseout',  () => layer.setStyle({ fillOpacity: 0.72 }));
  });
})();
</script>
</body>
</html>
