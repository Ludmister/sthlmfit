<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SthlmFit – Stadsdel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="topbar-inner">
      <button class="topbar-back" onclick="location.href='leaderboard.html'">
        <i class="ti ti-arrow-left"></i> Tillbaka
      </button>
      <div class="topbar-title" id="page-title">Laddar…</div>
      <div style="width:80px"></div>
    </div>
  </div>

  <div class="page-content" id="content">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="location.href='index.html'">
      <i class="ti ti-home"></i>Dashboard
    </button>
    <a class="nav-tab-log" href="log.html">
      <span class="icon"><i class="ti ti-plus"></i></span>Logga
    </a>
    <button class="nav-tab" onclick="location.href='leaderboard.html'">
      <i class="ti ti-trophy"></i>Tävling
    </button>
    <button class="nav-tab" onclick="location.href='friends.html'">
      <i class="ti ti-users"></i>Vänner
    </button>
    <button class="nav-tab" onclick="location.href='profile.html'">
      <i class="ti ti-user"></i>Profil
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;

  const params = new URLSearchParams(location.search);
  const nhId   = parseInt(params.get('id') || '0');
  const nhName = params.get('name') || 'Stadsdel';

  document.getElementById('page-title').textContent = nhName;
  document.title = `SthlmFit – ${nhName}`;

  const nhEntry = NEIGHBOURHOODS.find(n => n.id === nhId);
  const nhColor = nhEntry?.color || '#1D9E75';

  const profile = await getProfile(user.id).catch(() => null);
  const isMyNh  = profile?.neighbourhood_id === nhId;

  // Fetch leaderboard to get pts + rivalry
  const { data: lb } = await sb.from('neighbourhood_leaderboard').select('*');
  const sorted   = (lb || []).sort((a, b) => (b.weekly_points || 0) - (a.weekly_points || 0));
  const myEntry  = sorted.find(e => e.id === nhId);
  const myPts    = myEntry?.weekly_points || 0;
  const myRank   = sorted.findIndex(e => e.id === nhId) + 1;

  // Find closest rival (nearest in ranking)
  let rival = null;
  if (myRank > 1) rival = sorted[myRank - 2];
  else if (sorted.length > 1) rival = sorted[1];

  // Fetch detailed stats
  const { data: stats } = await sb.rpc('get_neighbourhood_stats', { nh_id: nhId });

  const weekDayLabels = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
  const today = new Date();
  const weekDays = getWeekDays();

  // Build bar chart from daily stats
  function buildChart(daily) {
    if (!daily || !daily.length) {
      return '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:14px">Inga pass loggade ännu denna vecka</div>';
    }
    const maxPts = Math.max(...daily.map(d => d.pts || 0), 1);
    const bars = weekDays.map((d, i) => {
      const iso    = formatDate(d);
      const dayData = (daily || []).find(x => x.date === iso);
      const pts    = dayData?.pts || 0;
      const h      = Math.round((pts / maxPts) * 64);
      const label  = weekDayLabels[i];
      return `
        <div class="bar-chart-col">
          <div class="bar-chart-bar" style="height:${h}px"></div>
          <div class="bar-chart-label">${label}</div>
        </div>`;
    }).join('');
    return `<div class="bar-chart-wrap">${bars}</div>`;
  }

  function buildFeed(recent) {
    if (!recent?.length) return '<div class="empty">Inga aktiviteter ännu denna vecka.</div>';
    return recent.map(r => `
      <div class="feed-item">
        <div class="feed-icon"><i class="ti ${activityIcon(r.activity)}"></i></div>
        <div class="feed-text">${activityLabel(r.activity)}
          ${activityKm(r.activity, r.duration) ? '· ' + activityKm(r.activity, r.duration) : '· ' + r.duration + ' min'}
        </div>
        <div class="feed-time">${timeAgo(r.created_at)}</div>
      </div>`).join('');
  }

  const totalKm = stats ? Math.round(stats.total_run_min * 10 / 60) / 10 : 0;

  document.getElementById('content').innerHTML = `
    <div class="war-hero" style="background:${nhColor}">
      <div class="war-hero-content">
        <div class="war-hero-label">STADSDEL · RANK #${myRank || '–'}</div>
        <div class="war-hero-name">${nhName}</div>
        <div class="war-hero-pts">${myPts.toLocaleString('sv-SE')} poäng denna vecka</div>
        ${isMyNh ? '<div style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.2);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:700">Din stadsdel</div>' : ''}
      </div>
    </div>

    <div class="war-stats-grid">
      <div class="war-stat">
        <div class="war-stat-val">${stats?.total_workouts || 0}</div>
        <div class="war-stat-label">Pass</div>
      </div>
      <div class="war-stat">
        <div class="war-stat-val">${myPts.toLocaleString('sv-SE')}</div>
        <div class="war-stat-label">Poäng</div>
      </div>
      <div class="war-stat">
        <div class="war-stat-val">${totalKm}</div>
        <div class="war-stat-label">km löpning</div>
      </div>
    </div>

    ${stats?.top_performer ? `
    <div class="card">
      <div class="card-label">VECKANS BÄSTA</div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
        <div class="friend-avatar" style="background:${nhColor}20;border-color:${nhColor}40;color:${nhColor}">
          ${(stats.top_performer[0] || '?').toUpperCase()}
        </div>
        <div>
          <div style="font-size:17px;font-weight:800">${stats.top_performer}</div>
          <div style="font-size:13px;color:var(--text-muted)">${(stats.top_pts || 0).toLocaleString('sv-SE')} poäng denna vecka</div>
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-label">AKTIVITET DENNA VECKA</div>
      ${buildChart(stats?.daily)}
    </div>

    ${rival ? `
    <div class="rivalry-card">
      <div class="rivalry-header">
        <i class="ti ti-sword"></i> Rivalitet
      </div>
      <div class="rivalry-vs">
        <div class="rivalry-side">
          <div class="rivalry-nh-name">${nhName}</div>
          <div class="rivalry-nh-pts">${myPts.toLocaleString('sv-SE')}</div>
        </div>
        <div class="rivalry-divider">VS</div>
        <div class="rivalry-side" style="text-align:right">
          <div class="rivalry-nh-name">${rival.name}</div>
          <div class="rivalry-nh-pts" style="color:var(--text-sub)">${(rival.weekly_points||0).toLocaleString('sv-SE')}</div>
        </div>
      </div>
      <div class="rivalry-gap-label">
        ${myPts > (rival.weekly_points||0)
          ? `${(myPts-(rival.weekly_points||0)).toLocaleString('sv-SE')} pts före ${rival.name}`
          : `${((rival.weekly_points||0)-myPts).toLocaleString('sv-SE')} pts bakom ${rival.name}`
        }
      </div>
    </div>` : ''}

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">Senaste aktivitet</div>
        <div class="live-badge"><div class="live-dot"></div>&nbsp;Live</div>
      </div>
      <div class="feed-wrap">${buildFeed(stats?.recent)}</div>
    </div>
  `;
})();
</script>
</body>
</html>
